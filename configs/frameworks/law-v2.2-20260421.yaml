# 法学论文评价框架 v2.2 研究版
# 基于 v2.1 继续迭代：优先提升大模型可判定性，不要求立即兼容当前 runtime loader

metadata:
  name: "法学评价框架 v2.2（研究版）"
  version: "2.2.0"
  discipline: "法学"
  source: "law-v2.1-20260421.yaml + law-scoring-rules-v0.1-20260413.md + 20260327_law_eval_gpt_claude.yaml"
  created: "2026-04-21"
  previous_version: "2.1.0"
  status: "research"
  changelog: |
    v2.2 变化（2026-04-21）：
    【总体原则】
    - 保留六维结构和权重，不新增维度
    - 优先优化大模型可判定性，不先追求兼容当前旧 loader/schema

    【维度与命名】
    - 保留 machine key：conclusion_consensus
    - 展示名称由“结论共识度”调整为“结论可接受性”
    - 明确高分标准是“共同体可回应 + 制度语境可接受”，不是“越接近主流越高分”

    【前置检查】
    - 学术伦理从“模型直接 reject”改为“疑点筛查 + 人工复核建议”
    - precheck 输出状态统一为 pass / conditional_pass / manual_review

    【Prompt 输出】
    - 删除模型自报 confidence 字段
    - 统一改为 evidence_quotes / strengths / weaknesses / limit_rule_triggered / boundary_note / review_flags / analysis

    【Rubric 结构】
    - 每维改写为“评什么 / 不评什么 / 看哪些证据 / 哪些缺陷触发上限”
    - 把跨维度上限规则显式写入各维 ceiling_rules

    【系统治理】
    - 区分度阈值、复核触发、验证计划、多模型可靠性转入 governance_appendix
    - 这些字段用于研究与校准，不直接驱动单模型评分

precheck:
  name: "学术规范性前置检查"
  description: "用于决定是否进入六维评分；研究版中学术伦理只做疑点筛查，不由 LLM 单独作最终不端裁决"
  criteria:
    - key: writing_norm
      name_zh: "写作规范性"
      description: "检查论文是否具有基本学术写作形态：表达清楚、结构完整、核心论点可定位"
      pass_required: true
    - key: citation_norm
      name_zh: "引用规范性"
      description: "检查引用格式、引文标注和注释使用是否基本规范，是否存在明显错引或伪引信号"
      pass_required: true
    - key: academic_ethics
      name_zh: "学术伦理"
      description: "仅做学术伦理疑点筛查：标记抄袭嫌疑、事实真实性疑点、数据/案例不可核验线索，必须进入人工或外部工具复核"
      pass_required: true
      review_required: true
  prompt_template: |
    请对这篇法学论文进行【学术规范性前置检查】。

    你的任务不是作最终处分决定，而是判断该稿件是否可以继续进入六维评分，或是否必须先进入人工复核。

    检查项目：
    1. 写作规范性：论点是否可定位？结构是否基本完整？表达是否清楚到可评审？
    2. 引用规范性：引文/注释是否基本规范？是否存在明显错引、伪引、张冠李戴的信号？
    3. 学术伦理：是否存在需要人工核验的抄袭嫌疑、案例真实性疑点、数据真实性疑点？

    输出状态只允许：
    - pass：基本符合要求，可进入六维评分
    - conditional_pass：存在轻微规范问题，可带着警告进入六维评分
    - manual_review：存在明显疑点，必须先人工或借助外部工具复核

    注意：
    - 不要输出 reject
    - 不要把“疑点”写成已经成立的学术不端结论
    - 学术伦理项目只能输出风险信号和复核建议

    请输出 JSON：
    {
      "status": "pass|conditional_pass|manual_review",
      "issues": ["问题列表"],
      "evidence_quotes": ["原文或注释片段"],
      "review_flags": ["ethics_risk|citation_risk|writing_risk"],
      "recommendation": "处理建议"
    }

scoring_structure:
  total_max: 100
  description: "六维度评分，总分100；研究版保留 v2.1 权重不变"

dimensions:
  - key: problem_originality
    name_zh: "问题创新性"
    name_en: "Problem Originality"
    weight: 0.30
    position: 1
    position_name: "起点"
    ai_difficulty: "high"
    description: |
      评估论文是否真正提出了可争辩的法学问题，以及该问题是否触及制度、规范或解释上的枢纽位置。
    evaluate:
      - "先定位论文明确提出的问题句、中心争点或待解释的规范冲突"
      - "判断该问题是否是法学问题，而不只是热点主题、政策口号或现实背景"
      - "判断该问题是否能牵动既有解释路径、制度结构或核心争论"
    do_not_evaluate:
      - "不要把‘首次研究’或‘现实意义重大’直接当成创新"
      - "不要用文献多少替代问题质量"
      - "不要因为表达宏大就误判为枢纽性"
    ceiling_rules:
      - trigger: "只有热点主题或政策背景，无法转成可争辩的法学问题"
        score_ceiling: 50
      - trigger: "只宣称填补空白，但没有说明问题为什么成立"
        score_ceiling: 70
    scoring_criteria:
      excellent:
        range: [80, 100]
        indicators:
          - "明确提出法学真问题，并触及制度/规范解释的枢纽处"
          - "问题能重组已有争论，而不是仅在既有话语里换表述"
      good:
        range: [60, 79]
        indicators:
          - "问题成立且有推进价值，但枢纽性有限"
          - "更多是对已有争论的深入、切分或重述"
      marginal:
        range: [40, 59]
        indicators:
          - "有主题但问题意识不稳定"
          - "现象描述多于问题提炼"
      unacceptable:
        range: [0, 39]
        indicators:
          - "热点词机械组合，无法形成法学问题"
          - "宏大叙事无聚焦，问题本身虚化"
    boundary_notes: |
      与“现状洞察度”的边界：
      - 本维度评“问题本身是否成立且重要”
      - 不评文献综述是否充分，那属于现状洞察度
    prompt_template: |
      请对这篇法学论文的【问题创新性】进行评分（0-100分）。

      先完成四步：
      1. 找出论文明确提出的问题句或中心争点
      2. 判断这是不是可争辩的法学问题，而非政策口号或热点主题
      3. 判断它是否触及制度、规范或解释上的枢纽
      4. 检查是否触发上限规则

      不要把“首次研究”“现实意义重大”“题目宏大”直接当作高分依据。

      请输出 JSON：
      {
        "dimension": "problem_originality",
        "score": <0-100整数>,
        "evidence_quotes": ["引用1", "引用2"],
        "strengths": ["优势1"],
        "weaknesses": ["缺陷1"],
        "limit_rule_triggered": ["若未触发则返回none"],
        "boundary_note": "说明本维度只评什么、不评什么",
        "review_flags": ["evidence_thin|boundary_overlap|none"],
        "analysis": "先说明问题是什么，再说明为什么成立或不成立，最后解释分数。"
      }

  - key: literature_insight
    name_zh: "现状洞察度"
    name_en: "Literature Insight"
    weight: 0.15
    position: 2
    position_name: "定位"
    ai_difficulty: "medium"
    description: |
      评估论文是否讲清楚既有研究已走到哪里、核心争点是什么、本文切入的未竟点在哪里。
    evaluate:
      - "从正文、注释、参考文献中识别代表观点、主线争点和未竟点"
      - "判断作者是否建立了研究地图，而不只是罗列观点"
      - "判断本文问题是否因文献定位而变得不可回避"
    do_not_evaluate:
      - "不要把参考文献数量直接当成高分"
      - "不要要求模型凭空判断‘顶刊近5年覆盖率’这类外部统计"
      - "不要把名家引用堆砌误判为洞察"
    ceiling_rules:
      - trigger: "只说已有研究不足，但没有说明到达点与未竟点"
        score_ceiling: 60
      - trigger: "文献堆砌，无法区分观点流派、争点和代表文献"
        score_ceiling: 55
    scoring_criteria:
      excellent:
        range: [80, 100]
        indicators:
          - "能概括代表观点、主线争论与未竟点"
          - "本文问题因其定位而显得不可回避"
      good:
        range: [60, 79]
        indicators:
          - "文献掌握较扎实，能说明研究缺口"
          - "争点提炼存在但不够锐利"
      marginal:
        range: [40, 59]
        indicators:
          - "文献综述基本停留在‘谁说了什么’"
          - "有材料但没有形成研究地图"
      unacceptable:
        range: [0, 39]
        indicators:
          - "无法说明既有研究已解决什么、未解决什么"
          - "引用与论证脱节"
    boundary_notes: |
      与“问题创新性”的边界：
      - 本维度评“既有研究的到达点与未竟点”
      - 不评问题本身是否新，那属于问题创新性
    prompt_template: |
      请对这篇法学论文的【现状洞察度】进行评分（0-100分）。

      先完成三步：
      1. 识别作者是否交代了代表观点和核心争点
      2. 判断作者是否说明既有研究的到达点与未竟点
      3. 检查是否只是罗列文献、是否触发上限规则

      注意：不要使用“顶刊近5年覆盖率”之类无法从文内直接验证的伪量化标准。

      请输出 JSON：
      {
        "dimension": "literature_insight",
        "score": <0-100整数>,
        "evidence_quotes": ["引用1", "引用2"],
        "strengths": ["优势1"],
        "weaknesses": ["缺陷1"],
        "limit_rule_triggered": ["若未触发则返回none"],
        "boundary_note": "说明为什么这是文献定位问题而不是问题创新性",
        "review_flags": ["evidence_thin|boundary_overlap|needs_external_context|none"],
        "analysis": "先说明作者如何定位前人研究，再说明缺口是否被清楚识别。"
      }

  - key: analytical_framework
    name_zh: "分析框架建构力"
    name_en: "Analytical Framework Construction"
    weight: 0.15
    position: 3
    position_name: "工具"
    ai_difficulty: "medium"
    description: |
      评估论文是否形成了可操作的分析工具，包括概念界定、类型划分、规范推导步骤或比较分析框架，并且该工具被后文实际调用。
    evaluate:
      - "检查是否有清楚的概念界定、类型化、分析步骤或比较框架"
      - "检查该框架是否被后文反复调用，而非只在绪论中出现"
      - "若为判例、实证、比较法论文，可额外看裁判规则归纳、研究设计、比较基准是否清楚"
    do_not_evaluate:
      - "不要因为术语高级、标签新潮就给高分"
      - "不要把材料丰富误判为框架成熟"
      - "不要把后文论证连贯性混进本维度，那属于逻辑严密性"
    ceiling_rules:
      - trigger: "理论贴标签，缺乏概念界定或类型边界"
        score_ceiling: 55
      - trigger: "框架只出现一次，后文并未真正调用"
        score_ceiling: 60
    scoring_criteria:
      excellent:
        range: [80, 100]
        indicators:
          - "建立了清楚、可操作的概念/类型/分析步骤"
          - "框架成为后文论证的工作台，而非装饰"
      good:
        range: [60, 79]
        indicators:
          - "已有较清楚的分析框架"
          - "具备操作性，但覆盖面或边界还可加强"
      marginal:
        range: [40, 59]
        indicators:
          - "有框架雏形，但停留在形式化分类"
          - "概念关系松散，支撑力有限"
      unacceptable:
        range: [0, 39]
        indicators:
          - "理论术语堆砌，概念混乱"
          - "分析框架与正文论证脱节"
    boundary_notes: |
      与“逻辑严密性”的边界：
      - 本维度评“分析工具本身是否成立、可用”
      - 不评这些工具在后续推理中的衔接是否严密，那属于逻辑严密性
    prompt_template: |
      请对这篇法学论文的【分析框架建构力】进行评分（0-100分）。

      请重点检查：
      1. 是否有可识别的概念界定、类型划分、分析步骤或比较框架
      2. 该框架是否被后文反复调用
      3. 是否触发“理论贴标签”或“框架未被使用”的上限规则

      请输出 JSON：
      {
        "dimension": "analytical_framework",
        "score": <0-100整数>,
        "evidence_quotes": ["引用1", "引用2"],
        "strengths": ["优势1"],
        "weaknesses": ["缺陷1"],
        "limit_rule_triggered": ["若未触发则返回none"],
        "boundary_note": "说明这是框架问题而不是纯逻辑衔接问题",
        "review_flags": ["boundary_overlap|concept_instability|none"],
        "analysis": "说明框架是什么、如何被使用、为什么能或不能支撑后文分析。"
      }

  - key: logical_coherence
    name_zh: "逻辑严密性"
    name_en: "Logical Coherence"
    weight: 0.25
    position: 4
    position_name: "骨架"
    ai_difficulty: "medium"
    description: |
      评估论证推进是否形成必要链条：后一步是否回应前一步提出的问题，核心结论能否由前文材料和规范推导出来。
    evaluate:
      - "尝试复述论文的核心推理链"
      - "检查关键结论能否由前文材料、案例、规范解释必要推出"
      - "检查论文是否处理主要反驳、限制条件和例外情形"
    do_not_evaluate:
      - "不要把语言流畅当成逻辑严密"
      - "不要把框架有没有提出混进来，那属于分析框架建构力"
      - "不要用结论是否讨喜替代推理质量"
    ceiling_rules:
      - trigger: "存在关键跳步，后一步不是前一步的必要回应"
        score_ceiling: 50
      - trigger: "核心结论无法由前文材料或规范分析推出"
        score_ceiling: 50
    scoring_criteria:
      excellent:
        range: [80, 100]
        indicators:
          - "能复述清楚的推理链，顺序不可随意颠倒"
          - "反例、限制条件或反驳处理充分"
      good:
        range: [60, 79]
        indicators:
          - "主线连贯，主要结论有支撑"
          - "存在局部薄弱处，但不伤主骨架"
      marginal:
        range: [40, 59]
        indicators:
          - "部分段落各说各话，呼应不足"
          - "从材料直接跳到结论的现象较多"
      unacceptable:
        range: [0, 39]
        indicators:
          - "论证链断裂，关键结论突兀"
          - "段落顺序可随意重组而不影响理解"
    boundary_notes: |
      与“分析框架建构力”的边界：
      - 本维度评“框架和材料如何推进结论”
      - 不评框架本身是否新颖可操作，那属于分析框架建构力
    prompt_template: |
      请对这篇法学论文的【逻辑严密性】进行评分（0-100分）。

      请先做两个测试：
      1. 链条复述测试：用一句话概括每一步推理，并判断是否可随意删改
      2. 结论推出测试：核心结论能否由前文材料、规范分析或案例推导出来

      不要把“写得顺”误判为“论证严”。

      请输出 JSON：
      {
        "dimension": "logical_coherence",
        "score": <0-100整数>,
        "evidence_quotes": ["引用1", "引用2"],
        "strengths": ["优势1"],
        "weaknesses": ["缺陷1"],
        "limit_rule_triggered": ["若未触发则返回none"],
        "boundary_note": "说明为什么这是逻辑链问题而不是框架问题",
        "review_flags": ["counterargument_missing|boundary_overlap|none"],
        "analysis": "按推理链展开说明，每一步是否回应上一环节。"
      }

  - key: conclusion_consensus
    name_zh: "结论可接受性"
    name_en: "Conclusion Acceptability"
    weight: 0.10
    position: 5
    position_name: "落脚"
    ai_difficulty: "high"
    description: |
      评估论文结论能否进入法学共同体语境并被认真回应，且在制度、判例、实践约束下具有可接受性。
    evaluate:
      - "检查论文是否回应规范体系、判例/实务约束和关键反对意见"
      - "判断结论是否在中国制度语境中说得通，而不是空泛表态"
      - "允许挑战主流，但要求挑战能够被共同体定位和回应"
    do_not_evaluate:
      - "不要把接近主流立场直接当作高分"
      - "不要把‘大家可能喜欢’等同于可接受性"
      - "不要把未来研究价值混进来，那属于前瞻延展性"
    ceiling_rules:
      - trigger: "自说自话，不回应共同体已有争论、判例或规范体系"
        score_ceiling: 55
      - trigger: "结论停留在“完善立法、加强监管、健全机制”等万能药表述"
        score_ceiling: 65
      - trigger: "结论与制度语境明显脱节"
        score_ceiling: 60
    scoring_criteria:
      excellent:
        range: [80, 100]
        indicators:
          - "能进入共同体核心争论，并给出可被认真回应的理由"
          - "与规范体系、判例或实务约束之间衔接清楚"
      good:
        range: [60, 79]
        indicators:
          - "具备共同体对话意识和制度可接受性"
          - "可行性分析较扎实，但反驳处理未达最佳"
      marginal:
        range: [40, 59]
        indicators:
          - "有结论，但回应对象模糊"
          - "对策泛化，与制度语境贴合不足"
      unacceptable:
        range: [0, 39]
        indicators:
          - "万能药式对策，缺乏制度约束分析"
          - "无法被共同体定位和回应"
    boundary_notes: |
      与“前瞻延展性”的边界：
      - 本维度评“当下能否被共同体和制度语境接受、回应”
      - 不评文章是否打开后续研究空间，那属于前瞻延展性
    prompt_template: |
      请对这篇法学论文的【结论可接受性】进行评分（0-100分）。

      重点判断：
      1. 结论是否回应了规范体系、判例/实务约束和关键反对意见
      2. 结论是否在中国制度语境中说得通
      3. 是否触发“自说自话”“万能药对策”或“制度脱节”的上限规则

      注意：
      - 挑战主流不扣分
      - 真正扣分的是无法进入共同体语境、无法被认真回应

      请输出 JSON：
      {
        "dimension": "conclusion_consensus",
        "score": <0-100整数>,
        "evidence_quotes": ["引用1", "引用2"],
        "strengths": ["优势1"],
        "weaknesses": ["缺陷1"],
        "limit_rule_triggered": ["若未触发则返回none"],
        "boundary_note": "说明这是可接受性问题而不是未来延展性问题",
        "review_flags": ["community_dialogue_gap|boundary_overlap|none"],
        "analysis": "说明论文如何进入共同体语境，以及结论为何可或不可接受。"
      }

  - key: forward_extension
    name_zh: "前瞻延展性"
    name_en: "Forward Extension"
    weight: 0.05
    position: 6
    position_name: "开放"
    ai_difficulty: "low"
    description: |
      评估论文是否在现有论证基础上打开下一轮研究、制度讨论或解释路径，而不是用口号式展望拔高。
    evaluate:
      - "检查论文是否基于正文论证提出后续研究或争论路径"
      - "检查作者是否说明反对者应从哪里进入下一轮争论"
      - "对判例分析、实务指南类论文保持克制，避免因文体特点误伤"
    do_not_evaluate:
      - "不要奖励与正文脱节的宏大展望"
      - "不要因为‘方向很大’就给高分"
      - "不要用本维度弥补前四维和结论可接受性的缺陷"
    ceiling_rules:
      - trigger: "以口号式展望替代真实延展"
        score_ceiling: 45
      - trigger: "前文论证站不住，却用前景重大抬分"
        score_ceiling: 50
    scoring_criteria:
      excellent:
        range: [80, 100]
        indicators:
          - "明确画出下一轮研究或制度争论地图"
          - "反对者也能知道该从哪里反驳"
      good:
        range: [60, 79]
        indicators:
          - "具有真实延展价值，但路径仍稍模糊"
          - "开放性建立在正文论证基础上"
      marginal:
        range: [40, 59]
        indicators:
          - "展望存在，但较空泛"
          - "与正文支撑关系较弱"
      unacceptable:
        range: [0, 39]
        indicators:
          - "自封终结争论"
          - "用空泛拔高替代延展"
    boundary_notes: |
      与“结论可接受性”的边界：
      - 本维度评“未来还能往哪里走”
      - 不评“当下是否能被共同体接受”，那属于结论可接受性
    prompt_template: |
      请对这篇法学论文的【前瞻延展性】进行评分（0-100分）。

      请重点判断：
      1. 论文是否基于正文论证打开了下一轮研究或制度讨论路径
      2. 后续路径是否具体，而不是口号式拔高
      3. 是否触发“口号式展望”或“用前景弥补正文缺陷”的上限规则

      请输出 JSON：
      {
        "dimension": "forward_extension",
        "score": <0-100整数>,
        "evidence_quotes": ["引用1", "引用2"],
        "strengths": ["优势1"],
        "weaknesses": ["缺陷1"],
        "limit_rule_triggered": ["若未触发则返回none"],
        "boundary_note": "说明为什么这是未来延展问题而不是当下可接受性问题",
        "review_flags": ["future_claim_thin|boundary_overlap|none"],
        "analysis": "说明论文是否真正为后续研究或争论画出了地图。"
      }

evaluation_chain:
  description: "六维判断链条；用于解释概念依赖关系，不要求 AI 按顺序打分"
  sequence:
    - dimension: problem_originality
      reason: "起点：先看问题是否成立"
    - dimension: literature_insight
      reason: "定位：再看作者如何放入已有研究"
    - dimension: analytical_framework
      reason: "工具：再看是否形成可操作的分析框架"
    - dimension: logical_coherence
      reason: "骨架：再看这些工具和材料能否推出结论"
    - dimension: conclusion_consensus
      reason: "落脚：再看结论能否进入共同体与制度语境"
    - dimension: forward_extension
      reason: "开放：最后看论文是否打开下一轮争论"

governance_appendix:
  note: "本附录用于研究校准和系统治理，不直接进入单模型评分 prompt"
  discrimination_threshold:
    description: "好/坏论文的总分差距，用于检验框架区分度"
    levels:
      - level: "显著差异"
        threshold: 50
        action: "区分度良好"
      - level: "明显差异"
        threshold: 30
        action: "可接受，但边界样本需复核"
      - level: "区分不足"
        threshold: 0
        action: "需重审 rubric 或权重"
  expert_review_triggers:
    dimension_triggers:
      - dimension: problem_originality
        condition: "触发问题虚化、热点拼接或边界高度模糊"
      - dimension: conclusion_consensus
        condition: "出现共同体对话缺口、制度可接受性争议或高分异常"
      - dimension: precheck.academic_ethics
        condition: "任何学术伦理疑点均进入人工或外部工具复核"
    overall_triggers:
      - condition: "总分高但任一核心维度明显低"
        action: "高分异常复核"
      - condition: "多模型维度分布异常一致"
        action: "怀疑 rubric 迎合，提升人工抽检优先级"
  validation_plan:
    description: "以正样本、负样本和中等样本校准 v2.2 的区分度与维度边界"
    steps:
      - "用三组正样本验证高质量论文不会塌缩成‘所有维度都差不多高’"
      - "用三组负样本验证问题虚化、文献形式化、理论贴标签能够被明显压分"
      - "加入至少三组中等样本，验证及格线判断和边界案例"
      - "专项检查挑战主流但论证扎实的论文，避免误伤结论可接受性"
      - "专项检查同一证据片段跨维重复计分问题"
  reliability_verification:
    multi_model_consensus:
      recommended_models: 3
      max_models: 5
      thresholds:
        high_confidence: "标准差 <= 5"
        medium_confidence: "标准差 > 5 且 <= 8"
        low_confidence: "标准差 > 8，需人工复核"
    system_risks:
      - "维度相关性持续升高，说明区分度退化"
      - "高分异常样本增多，说明模型可能在迎合 rubric"
      - "同一证据片段被多维反复引用，说明边界仍需继续收窄"
