# 法学论文评价框架 v2.14 研究版
# 基于 v2.10-v2.13 四维度操作化合并

metadata:
  name: "法学评价框架 v2.14（研究版）"
  version: "2.14.0"
  discipline: "法学"
  source: "v2.10-v2.13 四维度操作化合并"
  created: "2026-04-23"
  previous_version: "2.13.0"
  status: "research"
  changelog: |
    v2.14 变化（2026-04-23）：
    【四维度操作化合并版】

    整合 v2.10-v2.13 四个维度的双轨操作化改进：

    1. 分析框架建构力（来自 v2.10）：
       - 双轨操作化：框架可操作性4项检查清单 + 法学转化度4项检查清单
       - 跨学科概念只要转化为法学分析步骤就不算"理论贴标签"
       - ceiling_rules触发条件收窄

    2. 现状洞察度（来自 v2.12）：
       - 三要素量化评分（到达点/未竟点/本文切入点，每项0/1/2，总分0-6）
       - 法学流派定义明确化 + 强制认定规则
       - 新增partial_map_with_schools规则
       - 评分锚定表：三要素总分+法学流派数量→分档映射

    3. 前瞻延展性（来自 v2.11）：
       - 双轨操作化：延展实质度4项检查清单 + 正文衔接度4项检查清单
       - 法哲学论文的前瞻延展可以是理论深化方向
       - slogan_outlook触发条件收窄（延展实质度=0才触发）

    4. 结论可接受性（来自 v2.13）：
       - 双轨操作化：轨道A（共同体对话度）+ 轨道B（制度可接受度）
       - 按论文类型区分评分锚定和ceiling触发条件

    保持不变的维度：
    - 问题创新性（v2.9/v2.10 版本）
    - 逻辑严密性（v2.9/v2.10 版本）

    预期效果：
    - 四个改进维度的 std 均显著下降
    - 整体平均 std < 8
    - 高置信度比例 > 50%

# 通用枚举定义
enums:
  review_flags:
    common:
      - key: "boundary_overlap"
        name_zh: "维度边界模糊"
        description: "评分依据与其他维度重叠，需人工判断归属"
        action: "标记供专家复核，检查是否需要调整 rubric"
      - key: "evidence_thin"
        name_zh: "证据不足"
        description: "文本证据不足以支撑判断，需更多上下文"
        action: "降低该维度权重或标记为'需补充材料'"
      - key: "none"
        name_zh: "无需复核"
        description: "判断清晰，无需人工介入"
        action: "直接采纳评分"
    dimension_specific:
      problem_originality:
        - key: "problem_validity_unclear"
          name_zh: "问题是否成立不清楚"
          description: "无法判断论文是否提出了真问题"
          action: "需专家判断问题意识"
      literature_insight:
        - key: "needs_external_context"
          name_zh: "需要外部文献数据库验证"
          description: "无法从文内判断文献覆盖充分性"
          action: "建议接入外部文献数据库或专家复核"
      analytical_framework:
        - key: "concept_instability"
          name_zh: "概念使用不稳定"
          description: "核心概念前后使用不一致"
          action: "标记为概念问题，可能影响逻辑严密性"
      logical_coherence:
        - key: "counterargument_missing"
          name_zh: "缺少反驳处理"
          description: "未处理明显反对意见或例外情形"
          action: "标记为论证不完整"
      conclusion_consensus:
        - key: "community_dialogue_gap"
          name_zh: "共同体对话缺口"
          description: "结论无法进入共同体语境"
          action: "需专家判断是否为创新突破或自说自话"
      forward_extension:
        - key: "future_claim_thin"
          name_zh: "未来延展依据薄弱"
          description: "延展路径与正文论证脱节"
          action: "标记为展望空泛"

  precheck_status:
    - key: "pass"
      name_zh: "通过"
      description: "基本符合要求，可进入六维评分"
      condition: "三项检查均无问题"
    - key: "conditional_pass"
      name_zh: "有条件通过"
      description: "存在需要专家后续关注的风险，但仍具备进入六维评分的可评性"
      condition: "存在引用规范、事实核验或写作结构风险，但不至于导致全文不可评"
      examples:
        - "参考文献表和脚注不完全一致，但核心论点仍可定位"
        - "存在若干需要人工核验的新近文献、预印本或事实性表述"
        - "结构层级略乱或表述欠清晰，但不影响六维评分的基本可执行性"
    - key: "manual_review"
      name_zh: "需人工复核"
      description: "单模型判断中用于标记明显风险，聚合后通常折算为 conditional_pass"
      condition: "单个模型认为存在明显疑点，需要人工核验"
      examples:
        - "学术伦理疑点（抄袭嫌疑、案例真实性疑点、数据真实性疑点）"
        - "大量引用错误或伪引信号，但全文仍可读"
    - key: "reject"
      name_zh: "拒绝进入评分"
      description: "稿件当前不可评，必须修订或人工确认后方可重新进入流程"
      condition: "文本严重不可读、主体内容残缺或存在明确不可继续评审的硬阻断线索"
      examples:
        - "文件损坏、OCR 基本失败或大面积乱码，无法定位核心论点"
        - "正文严重缺页或主体内容缺失，六维评分无法执行"
        - "出现明确伪造、严重学术伦理红线或明显虚构法源的强证据"

precheck:
  name: "学术规范性前置检查"
  description: "用于决定是否进入六维评分；v2.5 中多数风险只触发 conditional_pass，不再直接阻断六维评分"
  criteria:
    - key: writing_norm
      name_zh: "写作规范性"
      description: "检查论文是否具有基本学术写作形态：表达清楚、结构完整、核心论点可定位"
      pass_required: true
    - key: citation_norm
      name_zh: "引用规范性"
      description: "检查引用格式、引文标注和注释使用是否基本规范，是否存在明显错引或伪引信号"
      pass_required: true
    - key: academic_ethics
      name_zh: "学术伦理"
      description: "仅做学术伦理疑点筛查：标记抄袭嫌疑、事实真实性疑点、数据/案例不可核验线索，必须进入人工或外部工具复核"
      pass_required: true
      review_required: true
  prompt_template: |
    请对这篇法学论文进行【学术规范性前置检查】。

    你的任务不是作最终处分决定，而是判断该稿件当前是否：
    1. 可以直接进入六维评分；
    2. 可以带风险进入六维评分并在评分后交由人工复核；
    3. 当前不可评，必须先修订或人工确认。

    检查项目：
    1. 写作规范性：论点是否可定位？结构是否基本完整？表达是否清楚到可评审？
    2. 引用规范性：引文/注释是否基本规范？是否存在明显错引、伪引、张冠李戴的信号？
    3. 学术伦理：是否存在需要人工核验的抄袭嫌疑、案例真实性疑点、数据真实性疑点？

    输出状态判断标准（参考 enums.precheck_status）：
    - pass：三项检查均无问题
    - conditional_pass：存在需要专家后续关注的风险，但六维评分仍可执行
    - manual_review：单模型认为存在明显风险，供后续聚合使用；除非达到多模型共识，否则通常不会直接阻断
    - reject：仅用于真正不可评稿件，如全文严重不可读、主体内容残缺、明确伪造或明显不存在的核心法源

    注意：
    - 只有在“当前不可评”时才能输出 reject
    - 不要把"疑点"写成已经成立的学术不端结论
    - 学术伦理项目只能输出风险信号和复核建议
    - 若只是引用规范、事实核验、结构清晰度存在问题，但文章仍可读、可定位核心论点，应优先输出 conditional_pass，而不是 reject

    请输出 JSON：
    {
      "status": "pass|conditional_pass|manual_review|reject",
      "issues": ["问题列表"],
      "evidence_quotes": ["原文或注释片段"],
      "review_flags": ["ethics_risk|citation_risk|writing_risk"],
      "recommendation": "处理建议"
    }

scoring_structure:
  total_max: 100
  description: "六维度评分，总分100；研究版保留 v2.1 权重不变"
  ceiling_rules_application: "多个 ceiling_rules 同时触发时，取最低上限（最严格规则优先）"

decision_order:
  description: "单维评分必须按固定顺序完成，禁止先凭整体印象给分"
  steps:
    - "定位评价对象"
    - "抽取关键证据"
    - "判断是否触发上限规则"
    - "确定分档"
    - "给出最终分数"
    - "输出摘要与评分理由"

output_contract:
  description: "单模型、单维输出的统一结构；用于后续模型横向比较和程序校验"
  required_fields:
    - "dimension"
    - "score"
    - "band"
    - "summary"
    - "core_judgment"
    - "score_rationale"
    - "evidence_quotes"
    - "strengths"
    - "weaknesses"
    - "limit_rule_triggered"
    - "boundary_note"
    - "review_flags"
  field_constraints:
    score:
      type: "integer"
      range: [0, 100]
      description: "最终整数分，必须服从已触发 ceiling_rules 的最低上限"
    band:
      allowed_values: ["excellent", "good", "marginal", "unacceptable"]
      description: "先分档，再在分档内给分"
    summary:
      max_chars: 50
      description: "用于报告展示的一句话摘要，不写分数"
    core_judgment:
      max_chars: 80
      description: "一句话说明该维是否成立，不写分数"
    score_rationale:
      max_chars: 120
      description: "一句话说明为什么是这个分数而不是更高/更低"
    evidence_quotes:
      max_count: 2
      max_chars_per_quote: 80
      description: "最关键的原文证据，优先少而准"
    strengths:
      max_count: 2
      max_chars_per_item: 50
    weaknesses:
      max_count: 2
      max_chars_per_item: 50
    limit_rule_triggered:
      description: "若未触发任何规则，返回空数组 []"
    review_flags:
      description: "只能返回 enums.review_flags 中定义的 key"
  guardrails:
    - "score 缺失视为失败输出"
    - "不得输出 Markdown 代码块"
    - "不得输出 JSON 之外的前后缀说明"
    - "不得输出未定义字段"
    - "summary 不得写入分数"
    - "core_judgment 不得写入分数"
    - "score 必须服从触发的最低 score_ceiling"
    - 'review_flags 无触发时返回 ["none"]'
    - "不得同时返回 none 和其他 review flag"

# 输出字数控制（便于专家核验）
output_constraints:
  description: "字数控制目标：每个维度500字，六维度总计3000字，专家核验时间约30分钟"

  per_dimension_limits:
    evidence_quotes:
      max_count: 3
      max_chars_per_quote: 80
      description: "关键证据引用，每条不超过80字"
    strengths:
      max_count: 3
      max_chars_per_item: 50
      description: "主要优势，每条不超过50字"
    weaknesses:
      max_count: 3
      max_chars_per_item: 50
      description: "主要缺陷，每条不超过50字"
    limit_rule_triggered:
      max_chars_per_rule: 60
      description: "触发规则说明，每条不超过60字"
    boundary_note:
      max_chars: 60
      description: "维度边界说明，不超过60字"
    summary:
      max_chars: 50
      description: "面向报告的一句话摘要，不超过50字"
    core_judgment:
      max_chars: 80
      description: "一句话说明本维是否成立"
    score_rationale:
      max_chars: 120
      description: "一句话说明分数依据和不上更高/更低分的原因"

  triggered_adjustments:
    ceiling_rules_triggered:
      score_rationale_add_chars: 40
      description: "触发上限规则时，score_rationale可增加40字，用于说明规则触发依据"
    review_flags_non_none:
      score_rationale_add_chars: 40
      description: "复核标记非none时，score_rationale可增加40字，用于说明复核原因"
    low_score_below_40:
      score_rationale_add_chars: 30
      description: "分数低于40分时，score_rationale可增加30字，用于说明致命缺陷"

  dimension_max_chars: 500
  total_max_chars: 3000

  expert_review_guidance:
    target_time_per_dimension: "5分钟"
    target_time_total: "30分钟"
    focus_points:
      - "检查 evidence_quotes 是否准确引用原文"
      - "验证 core_judgment 和 score_rationale 中的判断逻辑是否成立"
      - "确认 limit_rule_triggered 是否正确触发"
      - "判断 review_flags 是否合理标记"

dimensions:
  - key: problem_originality
    name_zh: "问题创新性"
    name_en: "Problem Originality"
    weight: 0.30
    position: 1
    position_name: "起点"
    ai_difficulty: "high"
    description: |
      评估论文是否真正提出了可争辩的法学问题，以及该问题是否触及制度、规范或解释上的枢纽位置。
    evaluate:
      - "先定位论文明确提出的问题句、中心争点或待解释的规范冲突"
      - "判断该问题是否是法学问题，而不只是热点主题、政策口号或现实背景"
      - "判断该问题是否能牵动既有解释路径、制度结构或核心争论"
    do_not_evaluate:
      - "不要把'首次研究'或'现实意义重大'直接当成创新"
      - "不要用文献多少替代问题质量"
      - "不要因为表达宏大就误判为枢纽性"
    ceiling_rules:
      - rule_id: "problem_originality.no_justiciable_question"
        trigger: "论文只描述政策背景、社会现象或现实困境，未提出任何可争辩的法学问题（含法哲学问题）"
        score_ceiling: 50
        priority: 1
        severity: "critical"
        detection_method: "检查论文是否包含：(1)明确的问题句或争点；(2)与法律规范、法律制度或法律理论相关的讨论。若只有政策背景描述或纯事实陈述，无任何法学层面的争辩点，则触发"
        examples:
          - "标题为《论新质生产力区域协调发展的法治化之道》，全文只解读政策，未提出可争辩的法学争点"
          - "全文围绕社会现象描述，无法转化为法学问题"
          - "纯政策建议式文章，没有任何法学论证或规范分析"
        anti_examples:
          - "论文探讨司法公正的哲学基础是否可以由同理心支撑——这是法哲学问题，属于法学问题的范围，不触发此规则"
          - "论文质疑某法律制度的正当性——即使论证偏宏观，也属于法学问题"
      - rule_id: "problem_originality.weak_problem_formulation"
        trigger: "问题意识薄弱：论文宣称'填补空白'但未说明为何是问题，或问题表述过于宏大无法聚焦"
        score_ceiling: 65
        priority: 2
        severity: "major"
        detection_method: "检查问题陈述是否包含'为什么这是问题'的论证；若只有'尚未研究'或纯宏观叙事而无具体争点，则触发"
        examples:
          - "只说'该问题尚未有人研究'，但未说明为什么这是个问题"
          - "问题表述过于宏大，无法聚焦到具体争点"
    scoring_criteria:
      excellent:
        range: [80, 100]
        indicators:
          - "可争辩性≥2项（有明确争点+涉及法学规范或理论争议）"
          - "枢纽性≥2项（问题解决牵动多方面）"
      good:
        range: [60, 79]
        indicators:
          - "可争辩性≥2项但枢纽性=1项"
          - "问题成立且有推进价值，但枢纽性有限"
      marginal:
        range: [40, 59]
        indicators:
          - "可争辩性=1项（有主题但问题意识不稳定）"
          - "现象描述多于问题提炼"
      unacceptable:
        range: [0, 39]
        indicators:
          - "可争辩性=0项（无法学层面的争辩点）"
          - "宏大叙事无聚焦，问题本身虚化"
    boundary_notes: |
      与"现状洞察度"的边界：
      - 本维度评"问题本身是否成立且重要"
      - 不评文献综述是否充分，那属于现状洞察度
    prompt_template: |
      请对这篇法学论文的【问题创新性】进行评分（0-100分）。

      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      第一步：可争辩性检查（逐项计分）
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      □ 标准1：是否有明确的问题句或争点
         满足条件：能找到"XX是否YY"、"如何ZZ"、"XX能否作为YY的基础"等问题句
         ✅ 成立示例："司法公正能否以同理心正义作为整合多元诉求的基础？"
         ❌ 不成立示例："论新质生产力的法治化"（无问题句，只是主题声明）

      □ 标准2：是否涉及法学层面（而非纯政策/事实层面）
         满足条件：问题涉及法律规范、法律制度、法律理论或法哲学争议
         【重要】法哲学问题也是法学问题！以下都属于法学层面：
         - 涉及法律规范的解释或适用争点
         - 涉及法律制度的正当性或设计争点
         - 涉及法律理论的核心争论（如形式理性vs实质理性）
         - 涉及司法裁判的正当化基础（如正义原则能否作为裁判理由）
         以下不属于法学层面（才是纯政策/事实）：
         - 纯政策建议（"应加强XX立法"且无论证）
         - 纯社会现象描述（"XX问题很严重"但无法学分析）
         - 事实统计报告（无理论争辩点）

      □ 标准3：是否有理论分歧（而非共识或单向陈述）
         满足条件：论文讨论中存在不同观点或解释路径
         ✅ 成立示例："对于司法公正的基础，形式理性派认为___，实质理性派认为___"
         ❌ 不成立示例："学界一致认为XX"（无分歧）

      □ 标准4：是否非政策倡导（有法学论证而非纯应然主张）
         满足条件：论文包含法学层面的论证（而非只说"应该XX"）
         ✅ 成立示例："基于XX法理，应当采用YY解释路径"（有论证）
         ❌ 不成立示例："应加强网络安全立法"（无论证）

      可争辩性得分 = 满足的标准数量（0-4分）

      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      第二步：枢纽性检查（逐项计分）
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      □ 标准1：影响范围广 — 问题的解决是否影响多个相关制度/规范
      □ 标准2：争议焦点 — 是否是学界长期争论的核心问题
      □ 标准3：理论基础 — 是否涉及法学基本原理或核心概念
      □ 标准4：制度连锁 — 问题的解决是否需要调整多个制度

      枢纽性得分 = 满足的标准数量（0-4分）

      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      第三步：确定分数
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      评分锚定规则（先按此规则确定分档，再在档内微调）：

      ┌────────────┬────────────┬─────────────────┐
      │ 可争辩性    │ 枢纽性      │ 分档             │
      ├────────────┼────────────┼─────────────────┤
      │ ≥3         │ ≥2         │ excellent(80-100)│
      │ ≥3         │ 1          │ good(70-79)      │
      │ ≥2         │ ≥2         │ good(60-69)      │
      │ ≥2         │ ≤1         │ marginal(50-59)  │
      │ ≤1         │ 任意       │ unacceptable     │
      │            │            │ (0-49，触发上限) │
      └────────────┴────────────┴─────────────────┘

      【上限规则】：
      1. 可争辩性 ≤ 1 → 最高 50 分（no_justiciable_question）
      2. 可争辩性 = 2 但问题表述过于宏大无法聚焦 → 最高 65 分（weak_problem_formulation）
      多个上限规则同时触发时，取最低上限。

      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      第四步：维度边界
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      - 本维度评：问题本身是否成立且重要
      - 不评：文献综述是否充分（现状洞察度）
      - 不评：论文的论证是否严密（逻辑严密性）

      不要把"首次研究""现实意义重大""题目宏大"直接当作高分依据。

      【字数要求】（本维度总计不超过500字）：
      - evidence_quotes：最多2条，每条不超过80字
      - strengths/weaknesses：各最多2条，每条不超过50字
      - limit_rule_triggered：每条不超过60字
      - boundary_note：不超过60字
      - summary：不超过50字
      - core_judgment：不超过80字
      - score_rationale：不超过120字，必须包含可争辩性得分和枢纽性得分

      输出必须满足 output_contract：
      - score 不得缺失
      - review_flags 无触发时返回 ["none"]
      - limit_rule_triggered 无触发时返回 []

      请输出 JSON：
      {
        "dimension": "problem_originality",
        "score": <0-100整数>,
        "band": "excellent|good|marginal|unacceptable",
        "summary": "一句话摘要",
        "core_judgment": "一句话说明该维是否成立",
        "score_rationale": "可争辩性得分=X/4，枢纽性得分=Y/4，锚定___档，给___分",
        "evidence_quotes": ["引用1", "引用2"],
        "strengths": ["优势1"],
        "weaknesses": ["缺陷1"],
        "limit_rule_triggered": [
          {
            "rule_id": "problem_originality.no_justiciable_question",
            "rule": "规则描述",
            "score_ceiling": 50,
            "priority": 1,
            "evidence": "触发该规则的具体证据"
          }
        ],
        "boundary_note": "说明本维度只评什么、不评什么",
        "review_flags": ["problem_validity_unclear|boundary_overlap|evidence_thin|none"]
      }

  - key: literature_insight
    name_zh: "现状洞察度"
    name_en: "Literature Insight"
    weight: 0.15
    position: 2
    position_name: "定位"
    ai_difficulty: "medium"
    description: |
      评估论文是否讲清楚既有研究已走到哪里、核心争点是什么、本文切入的未竟点在哪里。评分由三要素总分（0-6）和法学流派数量联合锚定。
    evaluate:
      - "逐项检查三要素（到达点/未竟点/本文切入点），每项0/1/2分"
      - "按法学流派定义统计识别的法学流派数量"
      - "根据三要素总分+法学流派数量的锚定表确定分档"
      - "判断作者是否建立了研究地图，而不只是罗列观点"
      - "判断本文问题是否因文献定位而变得不可回避"
    do_not_evaluate:
      - "不要把参考文献数量直接当成高分"
      - "不要要求模型凭空判断'顶刊近5年覆盖率'这类外部统计"
      - "不要把名家引用堆砌误判为洞察"
      - "不要把纯哲学/纯心理学资源误判为法学流派"
    ceiling_rules:
      - rule_id: "literature_insight.no_research_map"
        trigger: "三要素总分≤1（研究地图严重残缺：到达点、未竟点、本文切入点中至少两项缺失或仅有空泛表述）"
        score_ceiling: 55
        priority: 1
        severity: "critical"
        detection_method: "逐项检查三要素得分（0/1/2），计算总分。若三要素总分≤1则触发。具体检查：(1)到达点是否有至少1个具体研究成果+贡献；(2)未竟点是否明确指出具体争议或缺口；(3)本文切入点是否与未竟点直接对应"
        examples:
          - "文献综述只罗列观点，无法区分到达点与未竟点，三要素总分=0"
          - "只说'已有研究不足'但未说明到达点与具体不足，三要素总分=1"
          - "文献堆砌无研究地图构造，到达点和未竟点均缺失"
      - rule_id: "literature_insight.insufficient_school_coverage"
        trigger: "法学流派识别≤1（论文只引用单一流派观点或仅罗列文献而无流派识别，或识别的观点均为纯哲学/纯心理学资源而非法学流派）"
        score_ceiling: 65
        priority: 2
        severity: "major"
        detection_method: "按法学流派定义逐个统计：(1)法学内部对立立场；(2)跨学科法学理论（涉及法学层面讨论的）；(3)围绕同一法学争点的不同解释路径。排除纯哲学/纯心理学资源、孤立观点和同立场重复引用。若有效法学流派≤1则触发"
        examples:
          - "只引用形式法治派观点，未涉及实质法治派或其他法学争点的对立立场"
          - "引用了心理学理论但未说明其在法学层面的对话意义，不算法学流派"
          - "罗列多位学者观点但均为同一立场内的重复，仅算1个流派"
      - rule_id: "literature_insight.partial_map_with_schools"
        trigger: "三要素总分≤3但法学流派≥2（研究地图有缺口但流派识别充分，三要素中某项仅为部分满足）"
        score_ceiling: 79
        priority: 3
        severity: "minor"
        detection_method: "计算三要素总分，若≤3且法学流派≥2则触发。此规则不与insufficient_school_coverage同时触发（因为流派≥2已满足覆盖要求），但三要素缺口仍限制分数上限"
        examples:
          - "到达点充分(2)、未竟点部分(1)、本文切入点充分(2)，总分=3，但识别了3个法学流派"
          - "三要素中某项仅为部分满足，如未竟点只说'存在争议'但未说明争议内容"
    scoring_criteria:
      excellent:
        range: [80, 100]
        indicators:
          - "三要素总分5-6，法学流派≥3"
          - "本文问题因其定位而显得不可回避"
      good:
        range: [60, 79]
        indicators:
          - "三要素总分4-5，法学流派≥2"
          - "能说明研究缺口，争点提炼存在"
      marginal:
        range: [40, 59]
        indicators:
          - "三要素总分2-4，法学流派≤1"
          - "有材料但没有形成完整研究地图"
      unacceptable:
        range: [0, 39]
        indicators:
          - "三要素总分0-1"
          - "无法说明既有研究已解决什么、未解决什么"
    boundary_notes: |
      与"问题创新性"的边界：
      - 本维度评"既有研究的到达点与未竟点，以及法学流派覆盖"
      - 不评问题本身是否新，那属于问题创新性
    prompt_template: |
      请对这篇法学论文的【现状洞察度】进行评分（0-100分）。

      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      第一步：研究地图三要素检查（逐项计分）
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      每项要素评分标准：缺失=0，部分满足=1，充分满足=2

      □ 要素1：到达点（既有研究已解决什么）— 得分 0/1/2
         充分满足（得2分）：至少2个具体研究成果+其贡献，如"张三(2020)通过实证研究证明了XX"
         部分满足（得1分）：提及已有研究成果但只1个，或贡献描述模糊
         缺失（得0分）：只说"已有研究较多"而无具体成果，或纯引文堆叠无贡献提炼
         搜索关键词："XX研究指出"、"XX学者认为"、"已有研究表明"、"学界已经"

      □ 要素2：未竟点（缺口在哪里）— 得分 0/1/2
         充分满足（得2分）：明确指出"但尚未解决XX问题"或"仍存在XX争议"，并说明争议的具体内容
         部分满足（得1分）：提及研究不足但未说明具体不足之处，或未竟点与本文问题关联松散
         缺失（得0分）：只说"已有研究不足"而无任何具体描述
         搜索关键词："但"、"然而"、"尚未"、"仍然"、"争议"、"不足"、"缺乏"

      □ 要素3：本文切入点（要解决什么）— 得分 0/1/2
         充分满足（得2分）：本文研究问题与未竟点直接对应，如"针对上述争议，本文拟从XX角度解决"
         部分满足（得1分）：有本文切入点表述但与未竟点的对应关系不明确
         缺失（得0分）：只说"本文研究XX"而未说明与未竟点的关系
         搜索关键词："本文"、"笔者"、"拟"、"试图"、"旨在"

      三要素总分 = 到达点 + 未竟点 + 本文切入点（0-6分）

      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      第二步：法学流派识别（逐个统计）
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      【法学流派的定义】（必须按此标准判断）：

      算法学流派：
      ① 法学内部流派：形式法治派/实质法治派、法律道德主义/分离论、规范主义/功能主义等法学理论对立立场
      ② 跨学科法学理论：认知心理学与司法裁判交叉研究、现象学与法学交叉理论、实验经济学与法律效果评估等——凡在法学层面有理论对话的跨学科研究方向，算法学相关流派
      ③ 代表性学术立场：围绕同一法学争点形成的不同解释路径或规范主张

      不算法学流派：
      ④ 纯哲学/纯心理学/纯经济学理论（不涉及法学层面讨论的），如"现象学哲学本身""认知心理学理论本身"
      ⑤ 单个学者的孤立观点（无学派归属、无后续讨论）
      ⑥ 同一立场内的重复引用（算1个流派，不叠加计数）

      搜索关键词："XX学派"、"XX观点"、"有学者认为"、"另一种观点"、"XX主义"

      法学流派数量 = 识别的独立法学流派个数（0-N）

      【强制认定规则】：
      对以下组合，必须认定为至少2个法学流派（不可拆解为"只算1个"）：
      - "形式法治/实质法治" = 2个对立流派（形式法治派 vs 实质法治派）
      - "法律道德主义" = 其对立面"分离论"也构成独立流派（即"法律道德主义 vs 分离论"=2个流派）
      - "机械司法/社会学司法" = 2个对立流派
      - "认知心理学与司法裁判交叉" = 跨学科法学流派（1个）
      上述组合如果同时出现，法学流派数量≥3，不触发 insufficient_school_coverage。

      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      第三步：确定分数（锚定规则）
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      ┌──────────────┬──────────────┬──────────────────────┐
      │ 三要素总分    │ 法学流派数量  │ 分档                  │
      ├──────────────┼──────────────┼──────────────────────┤
      │ 5-6          │ ≥3           │ excellent(85-100)     │
      │ 5-6          │ 2            │ good(75-84)           │
      │ 4            │ ≥3           │ good(75-84)           │
      │ 4            │ 2            │ good(65-74)           │
      │ 4            │ ≤1           │ marginal(55-64)①     │
      │ 3            │ ≥2           │ good上限79②          │
      │ 3            │ ≤1           │ marginal(55-64)①     │
      │ 1-2          │ 任意         │ unacceptable(0-54)③   │
      │ 0            │ 任意         │ unacceptable(0-54)④   │
      └──────────────┴──────────────┴──────────────────────┘

      ① 三要素总分4但法学流派≤1：上限65分（触发insufficient_school_coverage）
      ② 三要素总分3但法学流派≥2：上限79分（三要素有缺口但流派识别充分，不触发insufficient_school_coverage）
      ③ 三要素总分1-2：研究地图严重残缺，上限55分（触发no_research_map）
      ④ 三要素总分0：无研究地图，上限55分（触发no_research_map）

      【上限规则】：
      1. 三要素总分 ≤ 1 → 最高55分（no_research_map：研究地图严重残缺）
      2. 法学流派识别 ≤ 1 → 最高65分（insufficient_school_coverage：流派覆盖不足）
      3. 三要素总分 ≤ 3 且法学流派 ≥ 2 → 最高79分（partial_map_with_schools：三要素有缺口但不触发流派上限）
      多个上限规则同时触发时，取最低上限。

      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      第四步：维度边界
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      - 本维度评：文献梳理的完整性和深度（研究地图是否清晰、法学流派覆盖是否充分）
      - 不评：问题本身是否新颖（问题创新性）
      - 不评：论证是否严密（逻辑严密性）

      不要使用"顶刊近5年覆盖率"等无法从文内验证的伪量化标准。

      【字数要求】（本维度总计不超过500字）：
      - evidence_quotes：最多2条，每条不超过80字
      - strengths/weaknesses：各最多2条，每条不超过50字
      - limit_rule_triggered：每条不超过60字
      - boundary_note：不超过60字
      - summary：不超过50字
      - core_judgment：不超过80字
      - score_rationale：不超过120字，必须包含"三要素得分=X/6，法学流派=Y个，锚定___档，给___分"

      请输出 JSON：
      {
        "dimension": "literature_insight",
        "score": <0-100整数>,
        "band": "excellent|good|marginal|unacceptable",
        "summary": "一句话摘要",
        "core_judgment": "一句话说明本维是否成立",
        "score_rationale": "三要素得分=X/6，法学流派=Y个，锚定___档，给___分",
        "evidence_quotes": ["引用1", "引用2"],
        "strengths": ["优势1"],
        "weaknesses": ["缺陷1"],
        "limit_rule_triggered": [
          {
            "rule_id": "literature_insight.no_research_map",
            "rule": "规则描述",
            "score_ceiling": 55,
            "priority": 1,
            "evidence": "触发该规则的具体证据"
          }
        ],
        "boundary_note": "说明为什么这是文献定位问题而不是问题创新性",
        "review_flags": ["needs_external_context|boundary_overlap|evidence_thin|none"]
      }

  - key: analytical_framework
    name_zh: "分析框架建构力"
    name_en: "Analytical Framework Construction"
    weight: 0.15
    position: 3
    position_name: "工具"
    ai_difficulty: "medium"
    description: |
      评估论文是否形成了可操作的分析工具，包括概念界定、类型划分、规范推导步骤或比较分析框架，并且该工具被后文实际调用。跨学科概念只要转化为可操作的法学分析步骤（如裁判规则、司法程序步骤），就不属于"理论贴标签"。
    evaluate:
      - "检查是否有清楚的概念界定、类型化、分析步骤或比较框架"
      - "检查该框架是否被后文反复调用，而非只在绪论中出现"
      - "检查跨学科概念是否已转化为法学操作层面的分析步骤"
      - "若为判例、实证、比较法论文，可额外看裁判规则归纳、研究设计、比较基准是否清楚"
    do_not_evaluate:
      - "不要因为术语高级、标签新潮就给高分"
      - "不要把材料丰富误判为框架成熟"
      - "不要把后文论证连贯性混进本维度，那属于逻辑严密性"
      - "不要把跨学科概念直接等同于'理论贴标签'——关键是看是否有法学转化步骤"
    ceiling_rules:
      - rule_id: "analytical_framework.no_operational_framework"
        trigger: "理论贴标签：核心术语完全无定义、无任何可循的分析步骤、且无法学层面的转化。以下情况不触发此规则：(1)跨学科概念已转化为可操作的法学分析步骤（如裁判规则、司法程序步骤）；(2)概念界定虽跨学科但已有法学层面的操作化步骤（如提供具体裁判适用流程）；(3)框架虽非纯法学概念但已提供法学判断标准或裁判适用指引"
        score_ceiling: 50
        priority: 1
        severity: "critical"
        detection_method: "同时检查三项：(1)核心术语是否有定义；(2)是否有可循的分析步骤；(3)是否有法学转化（裁判规则/司法程序/法律适用步骤）。三项均不满足才触发。若框架来自跨学科但已转化为法学操作步骤，则不触发"
        examples:
          - "只说'运用XX理论'但不解释该理论的核心要素，也无任何法学转化步骤"
          - "提出类型划分但不说明分类标准和边界，且无法学操作指引"
          - "概念前后使用不一致，且未提供法学层面的操作化方案"
        anti_examples:
          - "同理心正义虽来自心理学，但已转化为司法裁判四步运作机理（移情联想→位阶排序→反思权衡→理由优化）——有法学转化步骤，不触发"
          - "博弈论虽来自经济学，但已转化为立法博弈的三阶段分析框架——有法学转化步骤，不触发"
          - "社会学概念'社会分层'已转化为权利位阶排序的判断标准——有法学转化步骤，不触发"
      - rule_id: "analytical_framework.framework_unused"
        trigger: "框架只在绪论出现，后文未真正调用（框架术语在后文出现少于3次，或只用了部分类型）"
        score_ceiling: 60
        priority: 2
        severity: "major"
        detection_method: "统计框架核心术语在后文中的出现频率；检查是否所有类型/步骤都被使用"
        examples:
          - "绪论提出三分法，但后文只用了其中一种"
          - "框架术语在后文中未再出现或仅出现1-2次"
    scoring_criteria:
      excellent:
        range: [80, 100]
        indicators:
          - "框架可操作性≥3项（概念界定清晰、分类标准明确、分析步骤可循）"
          - "法学转化度≥2项（跨学科概念有法学转化步骤、提供裁判规则或制度方案）"
      good:
        range: [60, 79]
        indicators:
          - "框架可操作性≥2项但法学转化度有限"
          - "已有较清楚的分析框架，但法学转化不够充分"
      marginal:
        range: [40, 59]
        indicators:
          - "框架可操作性≥2项但法学转化度≤1项"
          - "有框架雏形，但停留在形式化分类或理论贴标签"
      unacceptable:
        range: [0, 39]
        indicators:
          - "框架可操作性≤1项（核心术语无定义、无分析步骤）"
          - "理论术语堆砌，无法学转化"
    boundary_notes: |
      与"逻辑严密性"的边界：
      - 本维度评"分析工具本身是否成立、可用、有法学转化"
      - 不评这些工具在后续推理中的衔接是否严密，那属于逻辑严密性
    prompt_template: |
      请对这篇法学论文的【分析框架建构力】进行评分（0-100分）。

      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      第一步：框架可操作性检查（逐项计分）
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      □ 标准1：概念界定是否清晰
         满足条件：核心术语有明确定义（如"本文所称XX是指…"），内涵和外延可识别
         ✅ 成立示例："本文所称'比例原则'，是指国家干预公民权利时必须满足适当性、必要性、狭义比例性三要件"
         ❌ 不成立示例："运用同理心正义理论"（未定义什么是同理心正义、其核心要素是什么）

      □ 标准2：分类标准是否明确
         满足条件：类型划分有边界和区分依据（如"根据XX标准可分为…"），不同类型间有明确区分
         ✅ 成立示例："根据干预程度，可将行政行为分为轻度干预、中度干预和重度干预三类"
         ❌ 不成立示例："有多种类型"（无分类标准和边界）

      □ 标准3：分析步骤是否可循
         满足条件：有步骤化的分析流程或判断标准（如"第一步…第二步…第三步…"），可按步骤逐步操作
         ✅ 成立示例："判断比例原则需三步：第一步检验适当性，第二步检验必要性，第三步检验狭义比例性"
         ❌ 不成立示例："需要综合考虑多方面因素"（无具体步骤）

      □ 标准4：后文是否实际调用
         满足条件：框架核心术语在后文中至少出现3次并发挥分析作用（而非仅出现1-2次）
         ✅ 成立示例：绪论提出"四步运作机理"，后文每个章节都使用该框架进行具体分析
         ❌ 不成立示例：绪论提出框架术语，后文未再提及或仅出现1次

      框架可操作性得分 = 满足的标准数量（0-4分）

      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      第二步：法学转化度检查（逐项计分）
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      【核心声明】：跨学科概念只要转化为可操作的法学分析步骤（如裁判规则、司法程序步骤、法律适用流程），就不属于"理论贴标签"。法学论文允许引入跨学科概念（心理学、经济学、社会学等），但必须将其转化为法学操作层面可使用的分析步骤。纯粹的跨学科理论移植（只说"运用XX理论"但不转化为法学操作步骤）才是"理论贴标签"。

      □ 标准1：跨学科概念是否转化为法学分析步骤
         满足条件：跨学科概念已转化为裁判推理步骤、法律适用流程或法律判断标准
         ✅ 成立示例："同理心正义转化为司法裁判的四步运作机理：移情联想→位阶排序→反思权衡→理由优化"
         ❌ 不成立示例："运用同理心正义理论分析司法公正"（未说明如何转化为法学操作）

      □ 标准2：是否提供裁判规则或司法程序层面的操作指引
         满足条件：框架包含裁判规则、判断标准或司法适用流程（而非仅停留在理论阐释层面）
         ✅ 成立示例："在位阶排序步骤中，法官应按权利强度从高到低排列冲突权利"
         ❌ 不成立示例："同理心正义要求法官体谅当事人"（停留在情感层面，无裁判操作指引）

      □ 标准3：是否在制度设计层面给出可操作方案
         满足条件：框架指向可操作的制度设计或立法建议（而非仅提出理论主张）
         ✅ 成立示例："基于反思权衡步骤，建议在立法中设置权利冲突的三级审查程序"
         ❌ 不成立示例："应完善相关立法"（无具体制度方案）

      □ 标准4：转化后的法学操作步骤是否在后文被实际使用
         满足条件：法学转化步骤在后文的分析中被反复调用（而非只存在于理论阐述部分）
         ✅ 成立示例：四步运作机理在后文每个案例分析中都被逐步应用
         ❌ 不成立示例：理论阐述部分提到四步机理，但案例分析部分并未按步骤展开

      法学转化度得分 = 满足的标准数量（0-4分）

      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      第三步：确定分数
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      评分锚定规则（先按此规则确定分档，再在档内微调）：

      ┌──────────┬──────────┬─────────────────┐
      │ 可操作性  │ 法学转化度│ 分档             │
      ├──────────┼──────────┼─────────────────┤
      │ ≥3       │ ≥2       │ excellent(80-100)│
      │ ≥3       │ 1        │ good(70-79)      │
      │ ≥2       │ ≥2       │ good(60-69)      │
      │ ≥2       │ ≤1       │ marginal(50-59)  │
      │ ≤1       │ 任意     │ unacceptable     │
      │          │          │ (0-49，触发上限) │
      └──────────┴──────────┴─────────────────┘

      【上限规则】：
      1. 框架可操作性 ≤ 1 → 最高 50 分（no_operational_framework）
         【重要】以下情况不触发此规则：
         - 跨学科概念已转化为可操作的法学分析步骤（如裁判规则、司法程序步骤）
         - 概念界定虽跨学科但已有法学层面的操作化步骤（如"移情联想→位阶排序→反思权衡→理由优化"）
         - 框架虽非纯法学概念，但已提供法学判断标准或裁判适用指引
         触发条件仅限：核心术语完全无定义 + 无任何可循的分析步骤 + 无法学转化
      2. 框架核心术语在后文出现少于3次且未被实际调用 → 最高 60 分（framework_unused）
      多个上限规则同时触发时，取最低上限。

      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      第四步：维度边界
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      - 本维度评：分析框架本身是否成立、可用、有法学转化
      - 不评：框架在推理中的衔接是否严密（逻辑严密性）
      - 不评：问题本身是否新颖（问题创新性）

      不要因为术语高级、标签新潮就给高分。
      不要把跨学科概念直接等同于"理论贴标签"——关键是看是否有法学转化步骤。

      【字数要求】（本维度总计不超过500字）：
      - evidence_quotes：最多2条，每条不超过80字
      - strengths/weaknesses：各最多2条，每条不超过50字
      - limit_rule_triggered：每条不超过60字
      - boundary_note：不超过60字
      - summary：不超过50字
      - core_judgment：不超过80字
      - score_rationale：不超过120字，必须包含框架可操作性得分和法学转化度得分

      输出必须满足 output_contract：
      - score 不得缺失
      - review_flags 无触发时返回 ["none"]
      - limit_rule_triggered 无触发时返回 []

      请输出 JSON：
      {
        "dimension": "analytical_framework",
        "score": <0-100整数>,
        "band": "excellent|good|marginal|unacceptable",
        "summary": "一句话摘要",
        "core_judgment": "一句话说明该维是否成立",
        "score_rationale": "框架可操作性得分=X/4，法学转化度得分=Y/4，锚定___档，给___分",
        "evidence_quotes": ["引用1", "引用2"],
        "strengths": ["优势1"],
        "weaknesses": ["缺陷1"],
        "limit_rule_triggered": [
          {
            "rule_id": "analytical_framework.no_operational_framework",
            "rule": "规则描述",
            "score_ceiling": 50,
            "priority": 1,
            "evidence": "触发该规则的具体证据"
          }
        ],
        "boundary_note": "说明这是框架建构力问题而不是逻辑衔接问题",
        "review_flags": ["concept_instability|boundary_overlap|evidence_thin|none"]
      }

  - key: logical_coherence
    name_zh: "逻辑严密性"
    name_en: "Logical Coherence"
    weight: 0.25
    position: 4
    position_name: "骨架"
    ai_difficulty: "medium"
    description: |
      评估论证推进是否形成必要链条：后一步是否回应前一步提出的问题，核心结论能否由前文材料和规范推导出来。
    evaluate:
      - "尝试复述论文的核心推理链"
      - "检查关键结论能否由前文材料、案例、规范解释必要推出"
      - "检查论文是否处理主要反驳、限制条件和例外情形"
    do_not_evaluate:
      - "不要把语言流畅当成逻辑严密"
      - "不要把框架有没有提出混进来，那属于分析框架建构力"
      - "不要用结论是否讨喜替代推理质量"
    ceiling_rules:
      - rule_id: "logical_coherence.broken_inference_chain"
        trigger: "存在关键跳步：后一步不是前一步的必要回应，或核心结论无法由前文推出（至少2处明显跳步）"
        score_ceiling: 50
        priority: 1
        severity: "critical"
        detection_method: "用链条复述测试：尝试用一句话概括每一步推理，检查是否可随意删改；用结论推出测试：检查核心结论能否由前文材料/规范分析推导出来"
        examples:
          - "从'现行法存在问题'直接跳到'应采用XX制度'，中间缺少论证"
          - "核心结论无法从前文材料或规范分析推导出来"
      - rule_id: "logical_coherence.weak_local_reasoning"
        trigger: "主线连贯但局部论证薄弱（1-2处跳步或反驳处理不足）"
        score_ceiling: 70
        priority: 2
        severity: "major"
        detection_method: "检查主要论证链是否完整；统计局部薄弱环节数量；检查是否处理主要反驳或限制条件"
        examples:
          - "主要论证链完整，但个别环节论证不够充分"
          - "未处理明显的反对意见或例外情形"
    scoring_criteria:
      excellent:
        range: [80, 100]
        indicators:
          - "能复述清楚的推理链，顺序不可随意颠倒"
          - "反例、限制条件或反驳处理充分"
      good:
        range: [60, 79]
        indicators:
          - "主线连贯，主要结论有支撑"
          - "存在局部薄弱处，但不伤主骨架"
      marginal:
        range: [40, 59]
        indicators:
          - "部分段落各说各话，呼应不足"
          - "从材料直接跳到结论的现象较多"
      unacceptable:
        range: [0, 39]
        indicators:
          - "论证链断裂，关键结论突兀"
          - "段落顺序可随意重组而不影响理解"
    boundary_notes: |
      与"分析框架建构力"的边界：
      - 本维度评"框架和材料如何推进结论"
      - 不评框架本身是否新颖可操作，那属于分析框架建构力
    prompt_template: |
      请对这篇法学论文的【逻辑严密性】进行评分（0-100分）。

      必须遵循统一判断顺序（参考 decision_order），并先定 band 再给分。

      请先做两个测试：
      1. 链条复述测试：用一句话概括每一步推理，并判断是否可随意删改
      2. 结论推出测试：核心结论能否由前文材料、规范分析或案例推导出来

      不要把"写得顺"误判为"论证严"。

      【字数要求】（本维度总计不超过500字）：
      - evidence_quotes：最多2条，每条不超过80字
      - strengths/weaknesses：各最多2条，每条不超过50字
      - limit_rule_triggered：每条不超过60字
      - boundary_note：不超过60字
      - summary：不超过50字
      - core_judgment：不超过80字
      - score_rationale：不超过120字

      请输出 JSON：
      {
        "dimension": "logical_coherence",
        "score": <0-100整数>,
        "band": "excellent|good|marginal|unacceptable",
        "summary": "一句话摘要",
        "core_judgment": "一句话说明本维是否成立",
        "score_rationale": "一句话说明分数依据",
        "evidence_quotes": ["引用1", "引用2"],
        "strengths": ["优势1"],
        "weaknesses": ["缺陷1"],
        "limit_rule_triggered": [
          {
            "rule_id": "logical_coherence.broken_inference_chain",
            "rule": "规则描述",
            "score_ceiling": 50,
            "priority": 1,
            "evidence": "触发该规则的具体证据"
          }
        ],
        "boundary_note": "说明为什么这是逻辑链问题而不是框架问题",
        "review_flags": ["counterargument_missing|boundary_overlap|evidence_thin|none"]
      }

  - key: conclusion_consensus
    name_zh: "结论可接受性"
    name_en: "Conclusion Acceptability"
    weight: 0.10
    position: 5
    position_name: "落脚"
    ai_difficulty: "high"
    description: |
      评估论文结论能否进入法学共同体语境并被认真回应，且在制度、判例、实践约束下具有可接受性。采用双轨操作化：轨道A评估共同体对话度，轨道B评估制度可接受度。对法哲学/理论类论文，轨道B主要看结论是否与现有法秩序逻辑兼容（而非要求具体制度方案）。
    evaluate:
      - "轨道A：检查结论是否回应了法学共同体已有争论，能否被反对者定位和回应"
      - "轨道A：检查结论在中国法学语境中是否说得通，论文是否主动承认并讨论反对意见"
      - "轨道B：检查结论是否不与现行法秩序根本矛盾"
      - "轨道B：检查结论是否对制度/实务约束有所回应（对理论论文，原则层面回应即可）"
      - "轨道B：检查结论是否指出了制度转化的可能方向（不要求具体方案）"
    do_not_evaluate:
      - "不要把接近主流立场直接当作高分"
      - "不要把'大家可能喜欢'等同于可接受性"
      - "不要把未来研究价值混进来，那属于前瞻延展性"
      - "不要对法哲学论文要求具体裁判规则或程序衔接方案——理论论文的贡献在于理论层面"
    ceiling_rules:
      - rule_id: "conclusion_consensus.no_community_dialogue"
        trigger: "结论自说自话：无法被法学共同体定位和回应，不回应任何已有争论，反对者无从进入对话"
        score_ceiling: 50
        priority: 1
        severity: "critical"
        detection_method: "检查结论是否：(1)回应了共同体已有争论；(2)能被反对者定位；(3)在中国法学语境中说得通；(4)承认了反对意见或自身局限。若4项均不满足，则触发"
        examples:
          - "结论提出全新观点但不说明与既有争论的关系，反对者无从进入对话"
          - "结论只有'应该XX'的政策表态，无法被法学共同体当作学术观点来回应"
          - "结论直接移植外国理论，不考虑中国法学语境的适配性"
        anti_examples:
          - "法哲学论文提出新理论框架但承认其局限并讨论与现行法秩序的关系——有共同体对话，不触发"
          - "挑战主流但给出反对者可定位的论证路径——有对话，不触发"
      - rule_id: "conclusion_consensus.no_institutional_grounding"
        trigger: "制度论文（实证/制度/判例分析类）结论未锚定任何现行规范、程序或裁判规则；或理论论文结论与现行法秩序根本矛盾且无任何回应"
        score_ceiling: 50
        priority: 2
        severity: "critical"
        detection_method: "先判断论文类型：(a)制度论文——检查结论是否提及现行规范、程序或裁判规则；(b)理论论文——检查结论是否与现行法秩序根本矛盾且无回应。制度论文无制度锚定→触发；理论论文根本矛盾且无回应→触发"
        examples:
          - "制度论文：结论提出改革方案但未提及任何现行法条、程序或裁判规则"
          - "理论论文：结论主张推翻现行法秩序的基本逻辑，且未讨论这一主张的影响或回应任何反对"
        anti_examples:
          - "法哲学论文提出新正义理论框架，虽无具体制度方案，但讨论了该理论与现行法治原则的关系并承认局限——不触发"
          - "法哲学论文结论能与现行法治传统对话，对规范约束回应偏原则化——不触发"
          - "制度论文结论虽不完美但明确锚定《民法典》某条并讨论适用路径——不触发"
      - rule_id: "conclusion_consensus.vague_recommendations"
        trigger: "制度论文结论停留在'完善立法、加强监管、健全机制'等万能药表述，缺乏具体制度路径；或理论论文结论虽有原则回应但完全没有制度转化方向的讨论"
        score_ceiling: 65
        priority: 3
        severity: "major"
        detection_method: "制度论文：检查对策建议是否具体到法条、程序或裁判规则层面；理论论文：检查结论是否至少指出制度转化的可能方向（哪怕模糊）"
        examples:
          - "制度论文：对策建议只有'应完善立法'、'应加强监管'，无具体路径"
          - "理论论文：结论只说'这一理论具有重要意义'，完全不讨论其与制度的可能关联"
        anti_examples:
          - "理论论文：结论说'这一理论框架可为XX制度改革提供正当化基础'——有方向，不触发"
          - "制度论文：结论具体指出应修改《XX法》第X条并说明理由——不触发"
    scoring_criteria:
      excellent:
        range: [80, 100]
        indicators:
          - "共同体对话度≥3且制度可接受度≥3（制度论文）或≥2（理论论文）"
          - "能进入共同体核心争论，并给出可被认真回应的理由"
          - "制度衔接清楚（制度论文），或与法秩序逻辑兼容且指出转化方向（理论论文）"
      good:
        range: [60, 79]
        indicators:
          - "共同体对话度≥2且制度可接受度≥2"
          - "具备共同体对话意识和制度可接受性"
          - "反驳处理未达最佳，或制度转化方向不够具体"
      marginal:
        range: [40, 59]
        indicators:
          - "共同体对话度≥1或制度可接受度=1"
          - "有结论，但回应对象模糊"
          - "对策泛化，与制度语境贴合不足"
      unacceptable:
        range: [0, 39]
        indicators:
          - "共同体对话度=0或制度可接受度=0"
          - "万能药式对策，缺乏制度约束分析"
          - "无法被共同体定位和回应"
    boundary_notes: |
      与"前瞻延展性"的边界：
      - 本维度评"当下能否被共同体和制度语境接受、回应"
      - 不评文章是否打开后续研究空间，那属于前瞻延展性
      - 本维度评"结论本身能否被接受"，不评"论证过程是否严密"（逻辑严密性）
    prompt_template: |
      请对这篇法学论文的【结论可接受性】进行评分（0-100分）。

      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      第零步：判断论文类型
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      先判断论文属于哪类（影响轨道B的评判标准）：
      - 理论论文：以法哲学、法理学、概念辨析、正当性论证为主，结论在理论层面
      - 制度论文：以实证分析、制度设计、判例分析、比较法为主，结论在制度层面
      - 混合论文：既有理论论证又有制度分析

      【重要声明】：法哲学/理论类论文的贡献在于理论层面，不要求提供具体裁判规则或程序衔接方案。对理论论文，轨道B"制度可接受度"主要看结论是否与现有法秩序逻辑兼容（而非要求具体制度方案），只要结论不与现行法秩序根本矛盾且对制度语境有所回应，轨道B标准即可通过。

      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      第一步：轨道A——共同体对话度（逐项计分）
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      □ 标准1：结论回应了法学共同体已有争论
         满足条件：结论明确说明与既有争论/观点的关系（赞同、修正或挑战）
         ✅ 成立示例："本文结论修正了张三关于XX的观点，认为应从YY角度理解"
         ❌ 不成立示例：结论只提出新观点，不说明与既有争论的关系（自说自话）

      □ 标准2：结论能被反对者定位和回应（不是自说自话）
         满足条件：反对者能清楚知道该结论在争论中的位置，并能构造反驳路径
         ✅ 成立示例：挑战主流但给出反对者可反驳的具体论点
         ❌ 不成立示例：结论只是"XX很重要"的表态，反对者无从进入对话

      □ 标准3：结论在中国法学语境中说得通
         满足条件：结论考虑了中国制度语境和法学传统，而非直接移植外国理论
         ✅ 成立示例：结论讨论了该观点在中国法治传统中的定位
         ❌ 不成立示例：直接移植外国制度/理论，不考虑本土适配

      □ 标准4：论文主动承认并讨论了反对意见或自身局限
         满足条件：结论部分或全文讨论了可能的反对意见，或承认自身论证的局限
         ✅ 成立示例："虽然本文主张XX，但这一主张面临YY挑战，需要进一步论证"
         ❌ 不成立示例：结论部分完全不提及任何反对意见或局限

      共同体对话度得分 = 满足的标准数量（0-4分）

      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      第二步：轨道B——制度可接受度（逐项计分）
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      □ 标准1：结论不与现行法秩序根本矛盾
         满足条件：结论不主张推翻现行法秩序的基本逻辑（即使挑战具体规则，整体兼容）
         ✅ 成立示例：结论挑战具体制度设计但与法治原则兼容
         ❌ 不成立示例：结论主张现行法秩序在根本逻辑上不可接受且无任何回应

      □ 标准2：对制度/实务约束有所回应
         对制度论文：结论回应了具体制度约束（法条、程序、裁判规则）
         对理论论文：结论在原则层面回应了制度约束（如讨论与现行法治原则的关系）
         ✅ 制度论文成立示例："考虑到《民法典》第XX条的限制，建议采用YY解释路径"
         ✅ 理论论文成立示例："这一理论框架与现行法治传统的关系是___"（原则层面即可）
         ❌ 不成立示例：结论完全不提及任何制度/实务约束

      □ 标准3：结论指出了制度转化的可能方向（不要求具体方案）
         满足条件：结论至少指出了理论/方案在制度层面可能如何落实的方向
         ✅ 成立示例："这一理论框架可为XX制度改革提供正当化基础"
         ✅ 成立示例（理论论文）："虽然本文未设计具体制度方案，但指出XX原则可为未来立法提供方向"
         ❌ 不成立示例：结论只说"具有重要意义"，完全不讨论与制度的可能关联

      □ 标准4：结论考虑了中国制度语境（而非直接移植外国制度）
         满足条件：结论讨论了在中国的制度条件下如何适用或转化
         ✅ 成立示例：结论讨论了外国经验在中国制度语境下的适配性
         ❌ 不成立示例：直接移植外国制度，不考虑中国制度条件

      制度可接受度得分 = 满足的标准数量（0-4分）

      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      第三步：确定分数
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      评分锚定规则（先按此规则确定分档，再在档内微调）：

      制度论文：
      ┌──────────────┬──────────────┬─────────────────┐
      │ 对话度(A)     │ 制度度(B)    │ 分档             │
      ├──────────────┼──────────────┼─────────────────┤
      │ ≥3           │ ≥3           │ excellent(80-100)│
      │ ≥3           │ 2            │ good(70-79)      │
      │ ≥2           │ ≥2           │ good(60-69)      │
      │ ≥2           │ ≤1           │ marginal(50-59)  │
      │ ≤1           │ 任意         │ unacceptable     │
      │              │              │ (0-49)           │
      └──────────────┴──────────────┴─────────────────┘

      理论论文（轨道B权重降低，触发条件放宽）：
      ┌──────────────┬──────────────┬─────────────────┐
      │ 对话度(A)     │ 制度度(B)    │ 分档             │
      ├──────────────┼──────────────┼─────────────────┤
      │ ≥3           │ ≥2           │ excellent(80-100)│
      │ ≥3           │ 1            │ good(70-79)      │
      │ ≥2           │ ≥1           │ good(60-69)      │
      │ ≥1           │ ≥1           │ marginal(50-59)  │
      │ ≤1 或 B=0    │ 任意         │ unacceptable     │
      │              │              │ (0-49)           │
      └──────────────┴──────────────┴─────────────────┘

      【上限规则】：
      1. 共同体对话度=0 → 最高50分（no_community_dialogue）
      2. 制度论文制度可接受度=0 → 最高50分（no_institutional_grounding）
      3. 理论论文制度可接受度=0且结论与现行法秩序根本矛盾 → 最高50分（no_institutional_grounding）
      4. 制度论文万能药对策或理论论文无制度方向 → 最高65分（vague_recommendations）
      多个上限规则同时触发时，取最低上限。

      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      第四步：维度边界
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      - 本维度评：结论当下能否被共同体和制度语境接受、回应
      - 不评：论证过程是否严密（逻辑严密性）
      - 不评：是否打开后续研究空间（前瞻延展性）

      注意：
      - 挑战主流不扣分
      - 真正扣分的是无法进入共同体语境、无法被认真回应
      - 法哲学论文的"制度可接受度"看逻辑兼容，不要求具体制度方案

      【字数要求】（本维度总计不超过500字）：
      - evidence_quotes：最多2条，每条不超过80字
      - strengths/weaknesses：各最多2条，每条不超过50字
      - limit_rule_triggered：每条不超过60字
      - boundary_note：不超过60字
      - summary：不超过50字
      - core_judgment：不超过80字
      - score_rationale：不超过120字，必须包含共同体对话度得分和制度可接受度得分

      输出必须满足 output_contract：
      - score 不得缺失
      - review_flags 无触发时返回 ["none"]
      - limit_rule_triggered 无触发时返回 []

      请输出 JSON：
      {
        "dimension": "conclusion_consensus",
        "score": <0-100整数>,
        "band": "excellent|good|marginal|unacceptable",
        "summary": "一句话摘要",
        "core_judgment": "一句话说明该维是否成立",
        "score_rationale": "共同体对话度得分=X/4，制度可接受度得分=Y/4，锚定___档，给___分",
        "evidence_quotes": ["引用1", "引用2"],
        "strengths": ["优势1"],
        "weaknesses": ["缺陷1"],
        "limit_rule_triggered": [
          {
            "rule_id": "conclusion_consensus.no_community_dialogue",
            "rule": "规则描述",
            "score_ceiling": 50,
            "priority": 1,
            "evidence": "触发该规则的具体证据"
          }
        ],
        "boundary_note": "说明这是可接受性问题而不是未来延展性问题",
        "review_flags": ["community_dialogue_gap|boundary_overlap|evidence_thin|none"]
      }

  - key: forward_extension
    name_zh: "前瞻延展性"
    name_en: "Forward Extension"
    weight: 0.05
    position: 6
    position_name: "开放"
    ai_difficulty: "low"
    description: |
      评估论文是否在现有论证基础上打开下一轮研究、制度讨论或解释路径，而不是用口号式展望拔高。
    evaluate:
      - "检查论文是否基于正文论证提出后续研究或争论路径"
      - "检查作者是否说明反对者应从哪里进入下一轮争论"
      - "对判例分析、实务指南类论文保持克制，避免因文体特点误伤"
    do_not_evaluate:
      - "不要奖励与正文脱节的宏大展望"
      - "不要因为'方向很大'就给高分"
      - "不要用本维度弥补前四维和结论可接受性的缺陷"
    ceiling_rules:
      - rule_id: "forward_extension.slogan_outlook"
        trigger: "全无具体后续方向 + 仅有空泛拔高表述（如'具有重大意义''前景广阔''将继续努力完善'等），延展实质度得分=0"
        score_ceiling: 50
        priority: 1
        severity: "critical"
        detection_method: "先按检查清单计算延展实质度得分；若得分=0（4项标准均不满足），且论文展望部分只有空泛拔高表述而无任何具体后续路径，则触发。以下情况不触发：(1)论文主动承认局限并提出修正方向哪怕是宏观方向；(2)论文提出具体的后续研究问题或理论深化方向；(3)法哲学/理论类论文指明理论修正路径"
        examples:
          - "只说'具有重大理论意义和实践价值'，无任何具体延展路径"
          - "展望部分只有'前景广阔''值得进一步关注'等空泛表述"
          - "自封终结争论，无任何后续方向"
        anti_examples:
          - "论文承认'本文对偏见风险的处理尚不充分'并提出'法官素养培育应从XX机制入手'→不算口号式展望，不触发此规则"
          - "论文提出'同理心正义的适用边界需在YY理论框架下进一步厘清'→有理论深化方向，不触发"
          - "法哲学论文指明'XX概念应从YY方向重构'→有理论修正路径，不触发"
          - "论文说'未来可从比较法角度研究XX制度'→有方法论指引，虽不够精细但不触发slogan_outlook，可考虑weak_extension_path"
      - rule_id: "forward_extension.weak_extension_path"
        trigger: "延展实质度≤2 且 正文衔接度≤2：后续路径存在但较空泛且与正文关联较弱"
        score_ceiling: 65
        priority: 2
        severity: "major"
        detection_method: "按检查清单计算延展实质度和正文衔接度得分；若延展实质度≤2且正文衔接度≤2，则触发"
        examples:
          - "提出后续研究方向但未说明如何进入"
          - "展望与正文论证的关联需靠推断而非原文明确支持"
          - "论文提出'未来可从比较法角度研究XX制度'但未说明切入点和方法"
        anti_examples:
          - "论文明确提出2个以上后续问题+指明方法+与正文结论对应→延展实质度≥3，不触发"
          - "法哲学论文提出理论修正方向+与正文核心结论对应→正文衔接度≥3，不触发"
    scoring_criteria:
      excellent:
        range: [80, 100]
        indicators:
          - "延展实质度≥3 + 正文衔接度≥3"
          - "明确画出下一轮研究/制度/理论争论地图"
      good:
        range: [60, 79]
        indicators:
          - "延展实质度≥2 + 正文衔接度≥2"
          - "具有真实延展价值，开放性建立在正文论证基础上"
      marginal:
        range: [40, 59]
        indicators:
          - "延展实质度≥1但较空泛，或正文衔接度不足"
          - "展望存在但与正文支撑关系较弱"
      unacceptable:
        range: [0, 39]
        indicators:
          - "延展实质度=0"
          - "全无具体后续方向，用空泛拔高替代延展"
    boundary_notes: |
      与"结论可接受性"的边界：
      - 本维度评"未来还能往哪里走"
      - 不评"当下是否能被共同体接受"，那属于结论可接受性
    prompt_template: |
      请对这篇法学论文的【前瞻延展性】进行评分（0-100分）。

      【重要声明】法哲学/理论类论文的前瞻延展可以是理论深化方向（如提出新理论假设、指明理论修正路径），不要求必须有实证研究设计或具体制度方案。理论论文的前瞻延展路径与实证论文不同，不可用同一标准评判。

      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      第一步：延展实质度检查（逐项计分，0-4分）
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      □ 标准1：后续研究问题
         满足条件：明确提出可继续研究的具体问题（非"未来可进一步研究"等泛指）
         ✅ 成立："偏见控制的制度设计如何从原则层面落地为程序规则"
         ❌ 不成立："未来可进一步研究"（无具体问题）

      □ 标准2：方法论或理论指引
         满足条件：指明后续研究应采用的方法/路径，或提出可供验证的理论假设

      □ 标准3：制度/实务或理论修正路径
         满足条件：为制度完善、实务改进或理论修正提供方向性指引
         【注意】理论论文满足此标准的方式可以是：指明理论修正方向、提出概念重构路径

      □ 标准4：反对者进入路径
         满足条件：说明不同意本文结论者应从何处切入下一轮争论

      延展实质度得分 = 满足的标准数量（0-4分）

      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      第二步：正文衔接度检查（逐项计分，0-4分）
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      □ 标准1：与正文核心结论对应
         延展路径是对正文核心结论的深化/修正/延伸，而非另起炉灶

      □ 标准2：修正方案基于正文局限
         论文主动承认正文论证的局限，并基于此提出修正方向

      □ 标准3：不引入无关新话题
         延展路径未引入正文从未涉及的新话题或新概念

      □ 标准4：延展路径可回溯至正文段落
         能定位正文具体段落作为延展路径的推出基础

      正文衔接度得分 = 满足的标准数量（0-4分）

      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      第三步：上限规则检查
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      规则1：slogan_outlook（score_ceiling=50）
      触发条件：延展实质度得分=0 + 仅有空泛拔高表述
      以下不触发：论文主动承认局限并提出修正方向；论文提出具体后续研究问题；理论论文指明理论修正路径

      规则2：weak_extension_path（score_ceiling=65）
      触发条件：延展实质度≤2 且 正文衔接度≤2

      多个上限规则同时触发时，取最低上限。

      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      第四步：评分锚定
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      │ 延展实质度 │ 正文衔接度 │ 分档             │
      │ ≥3         │ ≥3         │ excellent(80-100) │
      │ ≥3         │ 2          │ good(75-79)       │
      │ ≥2         │ ≥3         │ good(65-74)       │
      │ ≥2         │ 2          │ marginal(55-64)   │
      │ ≥1         │ ≥2         │ marginal(45-54)   │
      │ ≤1         │ 任意        │ unacceptable(0-44)│

      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      维度边界
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      - 本维度评：未来还能往哪里走
      - 不评：当下能否被共同体接受（结论可接受性）
      - 不评：论证是否严密（逻辑严密性）

      不要奖励与正文脱节的宏大展望。不要因为"方向很大"就给高分。

      【字数要求】（本维度总计不超过500字）：
      - evidence_quotes：最多2条，每条不超过80字
      - strengths/weaknesses：各最多2条，每条不超过50字
      - limit_rule_triggered：每条不超过60字
      - boundary_note：不超过60字
      - summary：不超过50字
      - core_judgment：不超过80字
      - score_rationale：不超过120字，必须包含延展实质度和正文衔接度得分

      请输出 JSON：
      {
        "dimension": "forward_extension",
        "score": <0-100整数>,
        "band": "excellent|good|marginal|unacceptable",
        "summary": "一句话摘要",
        "core_judgment": "一句话说明该维是否成立",
        "score_rationale": "延展实质度得分=X/4，正文衔接度得分=Y/4，锚定___档，给___分",
        "evidence_quotes": ["引用1", "引用2"],
        "strengths": ["优势1"],
        "weaknesses": ["缺陷1"],
        "limit_rule_triggered": [
          {
            "rule_id": "forward_extension.slogan_outlook",
            "rule": "规则描述",
            "score_ceiling": 50,
            "priority": 1,
            "evidence": "触发该规则的具体证据"
          }
        ],
        "boundary_note": "说明为什么这是未来延展问题而不是当下可接受性问题",
        "review_flags": ["future_claim_thin|boundary_overlap|evidence_thin|none"]
      }

evaluation_chain:
  description: "六维判断链条；用于解释概念依赖关系，不要求 AI 按顺序打分"
  sequence:
    - dimension: problem_originality
      reason: "起点：先看问题是否成立"
    - dimension: literature_insight
      reason: "定位：再看作者如何放入已有研究"
    - dimension: analytical_framework
      reason: "工具：再看是否形成可操作的分析框架"
    - dimension: logical_coherence
      reason: "骨架：再看这些工具和材料能否推出结论"
    - dimension: conclusion_consensus
      reason: "落脚：再看结论能否进入共同体与制度语境"
    - dimension: forward_extension
      reason: "开放：最后看论文是否打开下一轮争论"

governance_appendix:
  note: "本附录用于研究校准和系统治理，不直接进入单模型评分 prompt"

  discrimination_threshold:
    description: "好/坏论文的总分差距，用于检验框架区分度"
    levels:
      - level: "显著差异"
        threshold: 50
        action: "区分度良好"
      - level: "明显差异"
        threshold: 30
        action: "可接受，但边界样本需复核"
      - level: "区分不足"
        threshold: 0
        action: "需重审 rubric 或权重"

  expert_review_triggers:
    dimension_triggers:
      - dimension: problem_originality
        condition: "触发问题虚化、热点拼接或边界高度模糊"
      - dimension: conclusion_consensus
        condition: "出现共同体对话缺口、制度可接受性争议或高分异常"
      - dimension: precheck.academic_ethics
        condition: "任何学术伦理疑点均进入人工或外部工具复核"
    overall_triggers:
      - condition: "总分高但任一核心维度明显低"
        action: "高分异常复核"
      - condition: "多模型维度分布异常一致"
        action: "怀疑 rubric 迎合，提升人工抽检优先级"

  cross_dimension_consistency:
    description: "跨维度一致性检查规则，用于识别不合理的评分组合"
    rules:
      - condition: "问题创新性 < 40 且 前瞻延展性 > 70"
        flag: "inconsistent_innovation_extension"
        reason: "问题虚化的论文不太可能有真实延展价值"
        action: "标记为异常，需人工复核"
      - condition: "逻辑严密性 < 50 且 结论可接受性 > 70"
        flag: "inconsistent_logic_consensus"
        reason: "论证断裂的论文结论难以被共同体接受"
        action: "标记为异常，需人工复核"
      - condition: "现状洞察度 < 40 且 分析框架建构力 > 75"
        flag: "inconsistent_literature_framework"
        reason: "文献定位不清的论文难以建立有效框架"
        action: "标记为异常，需人工复核"
      - condition: "所有维度评分标准差 < 5"
        flag: "suspiciously_uniform"
        reason: "所有维度评分过于一致，可能是AI未区分维度"
        action: "标记为异常，需人工复核"

  validation_plan:
    description: "以正样本、负样本和中等样本校准 v2.3 的区分度与维度边界"
    steps:
      - "用三组正样本验证高质量论文不会塌缩成'所有维度都差不多高'"
      - "用三组负样本验证问题虚化、文献形式化、理论贴标签能够被明显压分"
      - "加入至少三组中等样本，验证及格线判断和边界案例"
      - "专项检查挑战主流但论证扎实的论文，避免误伤结论可接受性"
      - "专项检查同一证据片段跨维重复计分问题"

  reliability_verification:
    multi_model_consensus:
      recommended_models: 3
      max_models: 5
      thresholds:
        high_confidence: "标准差 <= 5"
        medium_confidence: "标准差 > 5 且 <= 8"
        low_confidence: "标准差 > 8，需人工复核"

    system_risks:
      - risk: "维度相关性持续升高"
        description: "六维度评分的Pearson相关系数过高，说明区分度退化"
        detection: "计算六维度评分的Pearson相关系数矩阵"
        threshold: 0.7
        action: "如果平均相关系数>0.7则预警，需重审 rubric"

      - risk: "高分异常样本增多"
        description: "总分很高但某个核心维度很低的样本比例过高"
        detection: "统计'总分>90且任一维度<60'的样本比例"
        threshold: 0.05
        action: "如果比例>5%则预警，可能是AI过度拟合某些维度"

      - risk: "同一证据片段被多维反复引用"
        description: "同一段文本被多个维度作为evidence_quotes引用"
        detection: "提取所有evidence_quotes，计算跨维度重复率"
        threshold: 0.30
        action: "如果重复率>30%则预警，说明维度边界仍需收窄"

      - risk: "ceiling_rules触发率过低"
        description: "上限规则很少被触发，可能是规则定义过严或AI未执行"
        detection: "统计各ceiling_rule的触发频率"
        threshold: 0.02
        action: "如果某规则触发率<2%（在负样本中），需检查规则定义或prompt"

      - risk: "review_flags使用率过低"
        description: "AI很少标记review_flags，可能是过度自信"
        detection: "统计各review_flag的使用频率"
        threshold: 0.05
        action: "如果所有样本中review_flags使用率<5%，需检查prompt或增加不确定性样本"

  sample_anchors:
    note: "样本锚点用于校准和验证，不直接进入评分prompt"
    positive:
      - paper: "林来梵《民法典编纂的宪法学透析》"
        type: "理论型"
        source: "法学研究 2016年第4期"
      - paper: "蒋红珍《比例原则位阶秩序的司法适用》"
        type: "理论型+判例分析"
        source: "法学研究 2020年第4期"
      - paper: "章志远《迈向公私合作型行政法》"
        type: "理论型"
        source: "法学研究 2019年第2期"
    negative:
      - paper: "《论新质生产力区域协调发展的法治化之道》"
        type: "追热点型"
        reason: "追热点式选题，问题虚构"
      - paper: "《行政机关采集人脸信息活动的法治因应》"
        type: "概念混乱型"
        reason: "概念混乱，理论仅为装饰"
      - paper: "《对外援助立法论纲》"
        type: "文献形式化型"
        reason: "文献梳理流于形式，无问题意识"
    notes: |
      【待补充】：
      1. 多元类型正样本：判例分析型、实证研究型、比较法型论文
      2. 负样本详细信息：发表来源、各维度得分、加权总分
      3. 中等质量样本：60-75分的及格线样本
