name: 法学论文评价框架
discipline: law
version: "1.0"
std_threshold: 5.0
dimensions:
  - key: problem_originality
    name_zh: 问题创新性
    name_en: Problem Originality
    weight: 0.1667
    prompt_template: |
      请评估以下法学论文在「问题创新性」维度的表现。
      评分范围：0-100分。
      评估要点：研究问题是否具有独创性，是否填补了现有研究空白。
      请从论文中引用1-3处关键证据，并给出分析说明。
      ---
      论文正文：
      {paper_content}
      ---
      参考文献列表：
      {references}
      ---
      请严格按以下 JSON 格式返回，不要输出其他内容：
      {"dimension": "problem_originality", "score": <0-100整数>, "evidence_quotes": ["引用1", "引用2"], "analysis": "分析文字"}

