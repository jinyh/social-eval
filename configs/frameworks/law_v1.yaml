name: 法学论文评价框架
discipline: law
version: "1.0"
std_threshold: 5.0
dimensions:
  - key: problem_originality
    name_zh: 问题创新性
    name_en: Problem Originality
    weight: 0.1667
    prompt_template: |
      你是法学论文评价助手。请评估以下论文在【问题创新性】维度的表现，评分范围为 0-100 分。

      维度定位：
      问题创新性评估论文是否抓住具有法学意义的真问题。重点不是“题目是否热门”或“作者是否自称填补空白”，而是论文能否从现象、规范、制度或解释困境中提炼出可争辩、可推进、具有枢纽意义的问题。

      全局评分协议：
      - 不得直接凭整体印象打分；必须先完成核心判断、证据片段、缺陷触发、最终分数四步。
      - 证据片段必须来自论文正文、注释、参考文献或论证结构，不得只复述作者自评。
      - 缺陷触发优先于正常印象分；一旦触发上限规则，最终分数不得超过相应上限。
      - 跨维度边界必须说明：本维度评“问题本身是否成立且有价值”，不评文献综述是否充分，那属于现状洞察度。

      分档锚点：
      - 90-100：提出此前未被充分问题化、且能重组法学讨论的枢纽问题。
      - 75-89：问题清楚，有新切口，能在既有争论中推进讨论。
      - 60-74：问题基本成立，但创新主要来自材料、场景或表述。
      - 40-59：有主题但问题意识弱，更多是政策背景或热点展开。
      - 0-39：没有可争辩的法学问题，只是口号、常识判断或热点拼接。

      缺陷触发与上限规则：
      - 只有热点主题、政策背景、宏大口号，无法转化为可争辩法学问题：问题创新性 <= 50。
      - 只说“已有研究不足”，但没有证明既有研究的到达点与未竟点：问题创新性 <= 70。
      - 仅凭“首次”“填补空白”“现实意义重大”等自称创新而无论证支撑：问题创新性 <= 60。

      论文正文：
      {paper_content}
      ---
      参考文献列表：
      {references}
      ---
      请严格按以下 JSON 格式返回，不要输出其他内容：
      实际返回必须是合法 JSON：score 为整数，evidence_quotes 为 1-3 个原文短句，analysis 为字符串；不要保留尖括号占位符，不要添加 Markdown 代码块或额外字段。
      {{"dimension": "problem_originality", "score": <0-100整数>, "evidence_quotes": ["引用1", "引用2"], "analysis": "按以下小标题写成一段文字：核心判断；证据片段；缺陷触发；跨维度边界；分档锚点；confidence_signals。"}}

  - key: literature_insight
    name_zh: 现状洞察度
    name_en: Literature Insight
    weight: 0.1667
    prompt_template: |
      你是法学论文评价助手。请评估以下论文在【现状洞察度】维度的表现，评分范围为 0-100 分。

      维度定位：
      现状洞察度评估论文是否讲清既有研究已经解决什么、尚未解决什么，以及这些未竟点为什么使本文问题变得必要。重点不是参考文献数量，而是能否区分代表文献、主要观点、争点结构、解释路径和真实缺口。

      全局评分协议：
      - 不得直接凭整体印象打分；必须先完成核心判断、证据片段、缺陷触发、最终分数四步。
      - 证据片段必须来自论文正文、注释、参考文献或论证结构，尤其要核对参考文献列表与综述内容是否支撑缺口判断。
      - 缺陷触发优先于正常印象分；一旦触发上限规则，最终分数不得超过相应上限。
      - 跨维度边界必须说明：本维度评“既有研究的到达点与未竟点”，不评问题本身是否新，那属于问题创新性。

      分档锚点：
      - 90-100：清楚说明既有研究已经解决什么、没有解决什么，并让本文问题变得不可回避。
      - 75-89：文献掌握扎实，能区分主要观点、流派和争点。
      - 60-74：有基本综述，但批判性、争点提炼或缺口证明有限。
      - 40-59：文献不少但主要罗列，未形成研究地图。
      - 0-39：基本不掌握相关研究，或虚构研究空白。

      缺陷触发与上限规则：
      - 只说“已有研究不足”，但没有说明既有研究到达点和未竟点：现状洞察度 <= 60。
      - 引用多但不区分观点流派、争点、代表文献和未解问题：现状洞察度 <= 55。
      - 引用只为装饰，和论证主线脱节：现状洞察度 <= 50。

      论文正文：
      {paper_content}
      ---
      参考文献列表：
      {references}
      ---
      请严格按以下 JSON 格式返回，不要输出其他内容：
      实际返回必须是合法 JSON：score 为整数，evidence_quotes 为 1-3 个原文短句，analysis 为字符串；不要保留尖括号占位符，不要添加 Markdown 代码块或额外字段。
      {{"dimension": "literature_insight", "score": <0-100整数>, "evidence_quotes": ["引用1", "引用2"], "analysis": "按以下小标题写成一段文字：核心判断；证据片段；缺陷触发；跨维度边界；分档锚点；confidence_signals。"}}

  - key: theoretical_construction
    name_zh: 理论建构力
    name_en: Theoretical Construction
    weight: 0.1667
    prompt_template: |
      你是法学论文评价助手。请评估以下论文在【理论建构力】维度的表现，评分范围为 0-100 分。

      维度定位：
      理论建构力评估论文是否形成可操作的概念、类型、解释框架、规范推导或制度分析框架。法学论文中，本维度应特别关注从规范到制度方案的推导能力，而不是抽象理论术语是否显得高级。

      全局评分协议：
      - 不得直接凭整体印象打分；必须先完成核心判断、证据片段、缺陷触发、最终分数四步。
      - 证据片段必须来自论文正文、注释、参考文献或论证结构，优先引用概念界定、类型划分、规范解释、制度推导相关段落。
      - 缺陷触发优先于正常印象分；一旦触发上限规则，最终分数不得超过相应上限。
      - 跨维度边界必须说明：本维度评“分析框架本身是否可操作”，不评框架后续使用是否连贯，那属于逻辑严密性。

      分档锚点：
      - 90-100：提出清晰类型、模型或规范解释框架，并能支撑后文制度推导。
      - 75-89：概念和框架清楚，能明显提升分析操作性。
      - 60-74：有框架雏形，但类型边界、适用条件或规范推导不够清楚。
      - 40-59：理论术语较多，但概念关系松散或与论证结合弱。
      - 0-39：理论贴标签，核心概念混乱或互相矛盾。

      缺陷触发与上限规则：
      - 套用“大词”但没有概念界定、类型化或规范推导：理论建构力 <= 55。
      - 类型化只是列目录，不能服务后续分析：理论建构力 <= 60。
      - 框架与论文问题脱节，只起装饰作用：理论建构力 <= 50。

      论文正文：
      {paper_content}
      ---
      参考文献列表：
      {references}
      ---
      请严格按以下 JSON 格式返回，不要输出其他内容：
      实际返回必须是合法 JSON：score 为整数，evidence_quotes 为 1-3 个原文短句，analysis 为字符串；不要保留尖括号占位符，不要添加 Markdown 代码块或额外字段。
      {{"dimension": "theoretical_construction", "score": <0-100整数>, "evidence_quotes": ["引用1", "引用2"], "analysis": "按以下小标题写成一段文字：核心判断；证据片段；缺陷触发；跨维度边界；分档锚点；confidence_signals。"}}

  - key: logical_coherence
    name_zh: 逻辑严密性
    name_en: Logical Coherence
    weight: 0.1667
    prompt_template: |
      你是法学论文评价助手。请评估以下论文在【逻辑严密性】维度的表现，评分范围为 0-100 分。

      维度定位：
      逻辑严密性评估论文的论证推进是否连贯、必要、可检验。重点看问题识别、文献定位、分析框架、制度结论之间是否形成不可随意颠倒的论证链，而不是语言是否流畅或章节标题是否完整。

      全局评分协议：
      - 不得直接凭整体印象打分；必须先完成核心判断、证据片段、缺陷触发、最终分数四步。
      - 证据片段必须来自论文正文、注释、参考文献或论证结构，优先引用体现推理链条、关键转折、结论推出过程的段落。
      - 缺陷触发优先于正常印象分；一旦触发上限规则，最终分数不得超过相应上限。
      - 跨维度边界必须说明：本维度评“框架和材料如何被用于推出结论”，不重复评价理论框架本身是否新或漂亮。

      分档锚点：
      - 90-100：每一步论证都是对前一步问题的必要回应，反例和限制条件处理充分。
      - 75-89：主线连贯，主要结论有材料、规范和推理支撑。
      - 60-74：基本能成立，但存在局部跳步、反驳不足或支撑不充分。
      - 40-59：经常从材料直接跳到结论，章节之间缺乏必要衔接。
      - 0-39：论证链断裂，关键结论无法由前文推出。

      缺陷触发与上限规则：
      - 后一步不是前一步的必要回应，材料不能支撑结论：逻辑严密性 <= 50。
      - 章节顺序可随意重组而不影响理解，说明缺乏内在递进：逻辑严密性 <= 60。
      - 语言流畅但没有可复述的论证链：逻辑严密性 <= 55。

      论文正文：
      {paper_content}
      ---
      参考文献列表：
      {references}
      ---
      请严格按以下 JSON 格式返回，不要输出其他内容：
      实际返回必须是合法 JSON：score 为整数，evidence_quotes 为 1-3 个原文短句，analysis 为字符串；不要保留尖括号占位符，不要添加 Markdown 代码块或额外字段。
      {{"dimension": "logical_coherence", "score": <0-100整数>, "evidence_quotes": ["引用1", "引用2"], "analysis": "按以下小标题写成一段文字：核心判断；证据片段；缺陷触发；跨维度边界；分档锚点；confidence_signals。"}}

  - key: scholarly_consensus
    name_zh: 学术共识度
    name_en: Scholarly Consensus
    weight: 0.1667
    prompt_template: |
      你是法学论文评价助手。请评估以下论文在【学术共识度】维度的表现，评分范围为 0-100 分。

      维度定位：
      学术共识度在本配置中应理解为“学术对话与共同体可回应度”，不是越符合主流越高分。重点评估论文是否进入法学共同体已有争论、规范体系、判例或关键反对意见，并给出可以被认真回应的理由；挑战主流本身不应扣分。

      全局评分协议：
      - 不得直接凭整体印象打分；必须先完成核心判断、证据片段、缺陷触发、最终分数四步。
      - 证据片段必须来自论文正文、注释、参考文献或论证结构，优先引用回应既有争论、判例、规范体系和反对意见的段落。
      - 缺陷触发优先于正常印象分；一旦触发上限规则，最终分数不得超过相应上限。
      - 跨维度边界必须说明：本维度评“能否被共同体定位、争辩和回应”，不评未来议题延展，那属于前瞻延展性。

      分档锚点：
      - 90-100：准确进入共同体核心争论，并能改变争论方式或解释基准。
      - 75-89：能回应主流观点、反对观点、规范体系和实务约束。
      - 60-74：有对话意识，但回应对象、争点或实务约束不够充分。
      - 40-59：只选择方便回应的观点，忽略关键反驳。
      - 0-39：基本自说自话，无法被共同体定位和回应。

      缺陷触发与上限规则：
      - 不回应法学共同体已有争论、判例、规范体系或关键反对意见：学术共识度 <= 55。
      - 结论停留在“完善立法、加强监管、健全机制”等万能药式对策：学术共识度 <= 65。
      - 文献堆砌但没有建立真实对话关系：学术共识度 <= 60。
      - 直接把“符合主流”当作高分理由：应重新判断，不得因此给高分。

      论文正文：
      {paper_content}
      ---
      参考文献列表：
      {references}
      ---
      请严格按以下 JSON 格式返回，不要输出其他内容：
      实际返回必须是合法 JSON：score 为整数，evidence_quotes 为 1-3 个原文短句，analysis 为字符串；不要保留尖括号占位符，不要添加 Markdown 代码块或额外字段。
      {{"dimension": "scholarly_consensus", "score": <0-100整数>, "evidence_quotes": ["引用1", "引用2"], "analysis": "按以下小标题写成一段文字：核心判断；证据片段；缺陷触发；跨维度边界；分档锚点；confidence_signals。"}}

  - key: forward_extension
    name_zh: 前瞻延展性
    name_en: Forward Extension
    weight: 0.1665
    prompt_template: |
      你是法学论文评价助手。请评估以下论文在【前瞻延展性】维度的表现，评分范围为 0-100 分。

      维度定位：
      前瞻延展性评估论文是否在既有论证基础上为后续研究、解释路径或制度讨论打开空间。好论文不一定终结争论，而是能让后续研究者知道下一轮争论应从哪里推进或反驳；脱离正文论证的宏大展望不应得高分。

      全局评分协议：
      - 不得直接凭整体印象打分；必须先完成核心判断、证据片段、缺陷触发、最终分数四步。
      - 证据片段必须来自论文正文、注释、参考文献或论证结构，优先引用结论、反驳位置、后续研究路径与制度解释接口。
      - 缺陷触发优先于正常印象分；一旦触发上限规则，最终分数不得超过相应上限。
      - 跨维度边界必须说明：本维度评“后续研究或制度讨论空间”，不补偿前四维的起点、文献、框架或逻辑缺陷。

      分档锚点：
      - 90-100：为后续研究或制度解释画出清楚地图，反对者也知道应从哪里反驳。
      - 75-89：能提出有根据的后续问题、解释路径或制度讨论方向。
      - 60-74：有一定延展价值，但仍较依赖一般性判断。
      - 40-59：展望比较空泛，与正文论证支撑关系弱。
      - 0-39：只是口号式展望、万能药式建议，或没有后续接口。

      缺陷触发与上限规则：
      - 前四维基础层明显站不住，不能靠“前景重大”获得高分：前瞻延展性 <= 60。
      - 只有热点主题、政策背景或宏大口号，没有真问题：前瞻延展性 <= 50。
      - 展望与正文论证脱节，只做宏大拔高：前瞻延展性 <= 45。
      - 结论停留在“完善立法、加强监管、健全机制”等万能药式建议：前瞻延展性 <= 50。

      论文正文：
      {paper_content}
      ---
      参考文献列表：
      {references}
      ---
      请严格按以下 JSON 格式返回，不要输出其他内容：
      实际返回必须是合法 JSON：score 为整数，evidence_quotes 为 1-3 个原文短句，analysis 为字符串；不要保留尖括号占位符，不要添加 Markdown 代码块或额外字段。
